                      <p style={{fontSize:12,color:C.tf,marginTop:4}}>{upLabel}</p>
                    </div>
                    <div style={{flex:1,minWidth:160}}>
                      <div style={{display:'flex',gap:16,marginBottom:8,flexWrap:'wrap'}}>
                        <div><p style={{fontSize:10.5,color:C.tf,margin:'0 0 2px'}}>Precio objetivo</p><p className="mono" style={{fontSize:16,fontWeight:700,color:C.t,margin:0}}>${res.projTarget}</p></div>
                        {res.projHigh&&<div><p style={{fontSize:10.5,color:C.tf,margin:'0 0 2px'}}>Máx. analistas</p><p className="mono" style={{fontSize:16,fontWeight:700,color:C.mint,margin:0}}>${res.projHigh}</p></div>}
                        {res.projLow&&<div><p style={{fontSize:10.5,color:C.tf,margin:'0 0 2px'}}>Mín. analistas</p><p className="mono" style={{fontSize:16,fontWeight:700,color:C.red,margin:0}}>${res.projLow}</p></div>}
                      </div>
                      {res.projConsensus&&(
                        <div style={{display:'flex',alignItems:'center',gap:10,flexWrap:'wrap'}}>
                          <span style={{fontSize:12.5,fontWeight:700,color:pc}}>{cIcon} Consenso: {res.projConsensus}</span>
                          {res.projTotal>0&&(
                            <span style={{fontSize:11.5,color:C.tf}}>
                              ({res.projBuy>0&&<span style={{color:C.mint}}>{res.projBuy} Compra</span>}
                              {res.projBuy>0&&res.projHold>0?' · ':''}
                              {res.projHold>0&&<span style={{color:'#F5C518'}}>{res.projHold} Mantener</span>}
                              {(res.projBuy>0||res.projHold>0)&&res.projSell>0?' · ':''}
                              {res.projSell>0&&<span style={{color:C.red}}>{res.projSell} Venta</span>})
                            </span>
                          )}
                        </div>
                      )}
                    </div>
                  </div>
                  <p style={{fontSize:10.5,color:C.tf,marginTop:10,fontStyle:'italic'}}>Basado en consenso de analistas de Wall Street vía Finnhub. No es recomendación de inversión.</p>
                </div>
              );
            }
            // ETFs: rendimiento histórico anual
            if(res.isETF&&res.etfHistReturn){
              var isPos=res.etfHistReturn.indexOf('+')>=0;
              var hc=isPos?C.mint:'#F5C518';
              return(
                <div style={{padding:'18px 22px',borderRadius:14,background:'rgba(61,220,151,0.05)',border:'1px solid '+C.mintD,marginBottom:16}}>
                  <p style={{fontSize:11.5,color:C.tf,fontWeight:600,letterSpacing:'0.06em',textTransform:'uppercase',margin:'0 0 12px'}}>📈 Proyección — Rendimiento Histórico Anual</p>
                  <div style={{display:'flex',alignItems:'center',gap:24,flexWrap:'wrap'}}>
                    <p className="mono" style={{fontSize:36,fontWeight:800,color:hc,margin:0}}>{res.etfHistReturn}</p>
                    <div>
                      <p style={{fontSize:13,color:C.td,margin:'0 0 4px'}}>{res.etfHistNote||'Promedio anual histórico'}</p>
                      <p style={{fontSize:11.5,color:C.tf,fontStyle:'italic'}}>Rendimientos pasados no garantizan resultados futuros.</p>
                    </div>
                  </div>
                </div>
              );
            }
            return null;
          })()}
          {(()=>{
            var score=res.isETF?calcETFScore(metrics):calcScore(metrics);
            if(score===null)return null;
            var r=44,circ=2*Math.PI*r,dash=(score/100)*circ;
            var sc=score>=65?C.mint:score>=35?'#F5C518':C.red;
            var sb=score>=65?C.mintD:score>=35?'#7A6010':'#6B2020';
            var sbg=score>=65?'rgba(61,220,151,0.06)':score>=35?'rgba(245,197,24,0.06)':'rgba(224,93,93,0.06)';
            var slabel=res.isETF?(score>=65?'ETF de Alta Calidad':score>=35?'ETF Aceptable':'ETF con Alertas'):(score>=65?'Valoración Favorable':score>=35?'Valoración Neutral':'Valoración en Alerta');
            var sdesc=res.isETF?(score>=65?'Este ETF combina bajo costo, buen tamaño, alta liquidez y gestora de primer nivel. Características sólidas para inversión a largo plazo.':score>=35?'El ETF tiene características aceptables con algún punto de cautela — revisa comisión, tamaño o liquidez antes de invertir.':'Este ETF presenta alertas importantes en coste, tamaño, liquidez o gestora. Considera alternativas más consolidadas.'):(score>=65?'Los indicadores fundamentales apuntan a una valoración atractiva. Buena base para analizar más a fondo.':score>=35?'Señales mixtas — algunos parámetros son atractivos y otros generan cautela. Investiga antes de decidir.':'La mayoría de los indicadores sugieren que el activo puede estar caro o presenta riesgos elevados.');
            var icon=score>=65?'📈':score>=35?'⚖️':'📉';
            // ── ICONO DE CRECIMIENTO ANUAL ESTIMADO ──
            var ge=res.growthEst;
            var geStr=ge!=null?((ge>=0?'+':'')+ge.toFixed(1)+'%'):'N/D';
            var geColor=ge==null?C.tf:ge>=15?C.mint:ge>=5?'#F5C518':ge>=0?'#aaa':C.red;
            var geBorderColor=ge==null?C.line:ge>=15?C.mintD:ge>=5?'#7A6010':ge>=0?'#444':'#6B2020';
            var geBgColor=ge==null?'rgba(255,255,255,0.03)':ge>=15?'rgba(61,220,151,0.07)':ge>=5?'rgba(245,197,24,0.07)':ge>=0?'rgba(180,180,180,0.05)':'rgba(224,93,93,0.07)';
            var geLabel=res.isETF?'RENDIMIENTO':'CRECIMIENTO EST.';
            // Arco del círculo de crecimiento: mapea rango -50% a +100% → 0 a 1
            var geNorm=ge!=null?Math.min(Math.max((ge+50)/150,0),1):0;
            var geDash=geNorm*circ;
            var geSourceShort=res.growthSrc?(res.growthSrc.length>40?res.growthSrc.slice(0,40)+'…':res.growthSrc):'Sin datos disponibles';
            return(
              <div style={{display:'flex',alignItems:'center',gap:24,padding:'20px 24px',borderRadius:14,background:sbg,border:`1px solid ${sb}`,marginBottom:20,flexWrap:'wrap'}}>
                {/* GAUGE 1: Aceptación */}
                <div style={{flexShrink:0}}>
                  <svg width="110" height="110" viewBox="0 0 110 110">
                    <circle cx="55" cy="55" r={r} fill="none" stroke={C.line} strokeWidth="9"/>
                    <circle cx="55" cy="55" r={r} fill="none" stroke={sc} strokeWidth="9"
                      strokeDasharray={dash+' '+circ} strokeLinecap="round"
                      transform="rotate(-90 55 55)"/>
                    <text x="55" y="48" textAnchor="middle" fill={sc} fontSize="21" fontWeight="800" fontFamily="JetBrains Mono,monospace">{score}%</text>
                    <text x="55" y="63" textAnchor="middle" fill={C.tf} fontSize="8.5" fontFamily="sans-serif" letterSpacing="0.5">ACEPTACIÓN</text>
                  </svg>
                </div>
                {/* GAUGE 2: Crecimiento Estimado Anual */}
                <div style={{flexShrink:0,background:geBgColor,borderRadius:14,border:`1px solid ${geBorderColor}`,padding:'8px 10px 6px',textAlign:'center'}}>
                  <svg width="110" height="110" viewBox="0 0 110 110">
                    <circle cx="55" cy="55" r={r} fill="none" stroke={C.line} strokeWidth="9"/>
                    {ge!=null&&<circle cx="55" cy="55" r={r} fill="none" stroke={geColor} strokeWidth="9"
                      strokeDasharray={geDash+' '+circ} strokeLinecap="round"
                      transform="rotate(-90 55 55)"/>}
                    <text x="55" y="46" textAnchor="middle" fill={geColor} fontSize={ge!=null&&Math.abs(ge)>=100?17:20} fontWeight="800" fontFamily="JetBrains Mono,monospace">{geStr}</text>
                    <text x="55" y="60" textAnchor="middle" fill={C.tf} fontSize="7.5" fontFamily="sans-serif" letterSpacing="0.3">{geLabel}</text>
                    <text x="55" y="72" textAnchor="middle" fill={C.tf} fontSize="7" fontFamily="sans-serif">ANUAL</text>
                  </svg>
                  <div style={{fontSize:9,color:C.tf,marginTop:0,maxWidth:110,lineHeight:1.35,padding:'0 4px 4px',wordBreak:'break-word'}}>
                    {geSourceShort}
                  </div>
                </div>
                {/* GAUGE 3: Volatilidad */}
                {(()=>{
                  var vp=res.volPct;
                  var vStr=vp!=null?(vp.toFixed(0)+'%'):'N/D';
                  var vColor=vp==null?C.tf:vp<25?C.mint:vp<60?'#F5C518':C.red;
                  var vBorder=vp==null?C.line:vp<25?C.mintD:vp<60?'#7A6010':'#6B2020';
                  var vBg=vp==null?'rgba(255,255,255,0.03)':vp<25?'rgba(61,220,151,0.07)':vp<60?'rgba(245,197,24,0.07)':'rgba(224,93,93,0.07)';
                  var vLabel=vp==null?'Sin datos':vp<25?'🟢 Baja':vp<60?'🟡 Moderada':'🔴 Alta';
                  var vNote=vp==null?'':vp<25?'Activo defensivo':vp<60?'Volatilidad normal de mercado':'Activo de alto riesgo';
                  // Arco: escala 0-150% → 0-1
                  var vNorm=vp!=null?Math.min(vp/150,1):0;
                  var vDash=vNorm*circ;
                  return(
                    <div style={{flexShrink:0,background:vBg,borderRadius:14,border:`1px solid ${vBorder}`,padding:'8px 10px 6px',textAlign:'center'}}>
                      <svg width="110" height="110" viewBox="0 0 110 110">
                        <circle cx="55" cy="55" r={r} fill="none" stroke={C.line} strokeWidth="9"/>
                        {vp!=null&&<circle cx="55" cy="55" r={r} fill="none" stroke={vColor} strokeWidth="9"
                          strokeDasharray={vDash+' '+circ} strokeLinecap="round"
                          transform="rotate(-90 55 55)"/>}
                        <text x="55" y="46" textAnchor="middle" fill={vColor} fontSize={vp!=null&&vp>=100?18:21} fontWeight="800" fontFamily="JetBrains Mono,monospace">{vStr}</text>
                        <text x="55" y="60" textAnchor="middle" fill={C.tf} fontSize="8" fontFamily="sans-serif" letterSpacing="0.3">VOLATILIDAD</text>
                        <text x="55" y="72" textAnchor="middle" fill={C.tf} fontSize="7" fontFamily="sans-serif">ANUAL</text>
                      </svg>
                      <div style={{fontSize:9,color:vColor,fontWeight:600,marginTop:0,padding:'0 4px 2px'}}>{vLabel}</div>
                      <div style={{fontSize:8.5,color:C.tf,padding:'0 4px 4px',lineHeight:1.3}}>{vNote}</div>
                    </div>
                  );
                })()}
                <div style={{flex:1,minWidth:180}}>
                  <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
                    <span style={{fontSize:22}}>{icon}</span>
                    <p style={{fontSize:17,fontWeight:700,color:sc,margin:0}}>{slabel}</p>
                  </div>
                  <p style={{fontSize:13.5,color:C.td,lineHeight:1.65,margin:'0 0 14px'}}>{sdesc}</p>
                  <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                    <span style={{fontSize:10.5,color:C.mint,background:'rgba(61,220,151,0.12)',padding:'4px 11px',borderRadius:20,fontWeight:600}}>🟢 Favorable ≥ 65%</span>
                    <span style={{fontSize:10.5,color:'#F5C518',background:'rgba(245,197,24,0.12)',padding:'4px 11px',borderRadius:20,fontWeight:600}}>🟡 Neutral 35–64%</span>
                    <span style={{fontSize:10.5,color:C.red,background:'rgba(224,93,93,0.12)',padding:'4px 11px',borderRadius:20,fontWeight:600}}>🔴 Alerta &lt; 35%</span>
                  </div>
                </div>
              </div>
            );
          })()}
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(240px,1fr))',gap:12,marginBottom:20}}>
            <div style={{padding:'18px 20px',borderRadius:12,background:C.s,border:`1px solid ${C.mintD}`}}>
              <p style={{fontSize:12,color:C.mint,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:12}}>✓ Señales positivas</p>
              {pc.pros.map((p,i)=><div key={i} style={{display:'flex',gap:8,marginBottom:10,fontSize:13.5,color:C.td,lineHeight:1.5}}><span style={{color:C.mint,flexShrink:0}}>+</span>{p}</div>)}
            </div>
            <div style={{padding:'18px 20px',borderRadius:12,background:C.s,border:'1px solid #5C3526'}}>
              <p style={{fontSize:12,color:C.terra,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:12}}>⚠ Señales de alerta</p>
              {pc.cons.map((c,i)=><div key={i} style={{display:'flex',gap:8,marginBottom:10,fontSize:13.5,color:C.td,lineHeight:1.5}}><span style={{color:C.terra,flexShrink:0}}>!</span>{c}</div>)}
            </div>
          </div>
          {res.desc&&(
            <div style={{padding:'18px 20px',borderRadius:12,background:C.s,border:`1px solid ${C.line}`,marginBottom:12}}>
              <p className="mono" style={{fontSize:11,color:C.tf,textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:8}}>Sobre la empresa</p>
              <p style={{fontSize:14,color:C.td,lineHeight:1.65,margin:0}}>{res.desc.length>600?res.desc.slice(0,600)+'…':res.desc}</p>
              {res.website&&<a href={res.website} target="_blank" rel="noopener noreferrer" style={{display:'inline-block',marginTop:10,fontSize:13,color:C.blue}}>{res.website}</a>}
            </div>
          )}
          <p style={{fontSize:12,color:C.tf,lineHeight:1.5}}>{res.isETF?'Datos de referencia del ETF — comisión e índice verificados. Precio de mercado: consulta tu bróker.':'Datos TTM vía Financial Modeling Prep. Información educativa — no es recomendación de compra o venta.'}</p>
        </div>
      )}
    </div>
  );
}

      <ModHeader eyebrow="Módulo 05" title="Centro de gestión de riesgo" body="Qué hacer ante caídas del mercado — con información, no con pánico."/>
      <div style={{display:'flex',flexDirection:'column',gap:8}}>
        {secs.map(s=>(
          <div key={s.id} style={{borderRadius:12,background:C.s,border:`1px solid ${open===s.id?C.mintD:C.line}`,overflow:'hidden',transition:'border-color 0.2s'}}>
            <button onClick={()=>setOpen(open===s.id?null:s.id)} style={{width:'100%',display:'flex',justifyContent:'space-between',alignItems:'center',padding:'18px 22px',border:'none',background:'transparent',color:C.t,cursor:'pointer',gap:12}}>
              <div style={{display:'flex',alignItems:'center',gap:12}}>
                <span style={{fontSize:18}}>{s.emoji}</span>
                <span className="serif" style={{fontSize:16,fontWeight:500}}>{s.title}</span>
              </div>
              <span style={{transform:open===s.id?'rotate(90deg)':'none',transition:'transform 0.2s',color:C.tf}}>→</span>
            </button>
            {open===s.id&&(
              <div style={{padding:'0 22px 20px'}}>
                <div style={{height:1,background:C.line,marginBottom:16}}/>
                {s.items.map((it,i)=>(
                  <div key={i} style={{marginBottom:14,paddingLeft:12,borderLeft:`2px solid ${C.mintD}`}}>
                    <p style={{fontSize:14,fontWeight:600,color:C.t,margin:'0 0 4px'}}>{it.t}</p>
                    <p style={{fontSize:13.5,color:C.td,lineHeight:1.6,margin:0}}>{it.d}</p>
                  </div>
                ))}
              </div>
            )}
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── MODULE 6: CALCULATOR ─────────────────────────────────────────────────────
function Calculator(){
  const [monthly,setMonthly]=useState(300);
  const [years,setYears]=useState(15);
  const compute=(rate)=>{const m=years*12,r=rate/12;let fv=0;for(let i=0;i<m;i++)fv=(fv+monthly)*(1+r);return Math.round(fv);};
  const total=monthly*years*12;
  const scenarios=[{k:'conservador',label:'Escenario conservador',r:0.05},{k:'promedio',label:'Promedio histórico',r:0.08},{k:'optimista',label:'Escenario optimista',r:0.11}];
  return(
    <div style={{maxWidth:820,margin:'0 auto',padding:'48px 20px'}}>
      <ModHeader eyebrow="Módulo 06" title="Calculadora de interés compuesto" body="Tres escenarios basados en rangos históricos reales — no un número único de retorno."/>
      <div style={{padding:'28px',borderRadius:16,background:C.s,border:`1px solid ${C.line}`,marginBottom:32}}>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:28,marginBottom:24}}>
          <div>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:10}}>
              <label style={{fontSize:14,color:C.td}}>Aporte mensual</label>
              <span className="mono" style={{fontSize:16,color:C.mint}}>${monthly.toLocaleString()}</span>
            </div>
            <input type="range" min="50" max="5000" step="50" value={monthly} onChange={e=>setMonthly(Number(e.target.value))} style={{width:'100%',accentColor:C.mint}}/>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:11.5,color:C.tf,marginTop:4}}><span>$50</span><span>$5,000</span></div>
          </div>
          <div>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:10}}>
              <label style={{fontSize:14,color:C.td}}>Horizonte</label>
              <span className="mono" style={{fontSize:16,color:C.mint}}>{years} años</span>
            </div>
            <input type="range" min="1" max="40" value={years} onChange={e=>setYears(Number(e.target.value))} style={{width:'100%',accentColor:C.mint}}/>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:11.5,color:C.tf,marginTop:4}}><span>1</span><span>40 años</span></div>
          </div>
        </div>
        <p style={{fontSize:13.5,color:C.tf,marginBottom:20}}>Total aportado: <span className="mono" style={{color:C.td}}>${total.toLocaleString()}</span></p>
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12}}>
          {scenarios.map(sc=>{
            const fv=compute(sc.r);
            const color=sc.k==='optimista'?C.mint:sc.k==='promedio'?C.blue:C.td;
            return(
              <div key={sc.k} style={{padding:'18px',borderRadius:12,background:C.s2,border:`1px solid ${C.line}`}}>
                <p style={{fontSize:12,color:C.tf,margin:'0 0 2px'}}>{sc.label}</p>
                <p className="mono" style={{fontSize:11,color:C.tf,margin:'0 0 12px'}}>{(sc.r*100).toFixed(0)}% anual</p>
                <p className="mono" style={{fontSize:24,fontWeight:700,color,margin:'0 0 6px'}}>${fv.toLocaleString()}</p>
                <p style={{fontSize:12,color:C.tf}}>Ganancia: <span style={{color:C.mint}}>+${(fv-total).toLocaleString()}</span></p>
              </div>
            );
          })}
        </div>
      </div>
      <h3 className="serif" style={{fontSize:20,fontWeight:500,margin:'0 0 8px'}}>Backtesting histórico</h3>
      <p style={{fontSize:14,color:C.td,lineHeight:1.6,marginBottom:20}}>Cómo se comportó una cartera 60/40 en los peores periodos modernos.</p>
      <div style={{display:'flex',flexDirection:'column',gap:8,marginBottom:24}}>
        {BACKTEST.map(p=>(
          <div key={p.label} style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:16,padding:'18px 22px',borderRadius:12,background:C.s,border:`1px solid ${C.line}`}}>
            <div style={{flex:1}}>
              <p style={{fontSize:14,fontWeight:500,margin:'0 0 4px'}}>{p.label}</p>
              <p style={{fontSize:13,color:C.tf,margin:0,lineHeight:1.5}}>{p.note}</p>
            </div>
            <span className="mono" style={{fontSize:22,fontWeight:700,color:p.ret<0?C.terra:C.mint,flexShrink:0}}>{(p.ret*100).toFixed(0)}%</span>
          </div>
        ))}
      </div>
      <div style={{padding:'16px 20px',borderRadius:12,border:`1px dashed ${C.line}`}}>
        <p style={{fontSize:13,color:C.tf,margin:0,lineHeight:1.6}}>⚠ Rendimiento pasado no garantiza rendimiento futuro. Usa estos datos como referencia de rangos posibles, no como predicciones.</p>
      </div>
    </div>
  );
}

// ─── PORTAFOLIO / WATCHLIST ──────────────────────────────────────────────────
function Watchlist(){
  var [wl,setWl]=useState(function(){try{return JSON.parse(localStorage.getItem('mc_watchlist')||'[]');}catch(e){return[];}});
  var [alerts,setAlerts]=useState(function(){try{return JSON.parse(localStorage.getItem('mc_alerts')||'{}');}catch(e){return{};}});
  var [prices,setPrices]=useState({});
  var [fetching,setFetching]=useState(false);
  var [alertItem,setAlertItem]=useState(null);
  var [aLow,setALow]=useState('');
  var [aHigh,setAHigh]=useState('');
  var profile=localStorage.getItem('mc_profile')||'moderado';

  var saveWl=function(list){setWl(list);localStorage.setItem('mc_watchlist',JSON.stringify(list));};
  var saveAlerts=function(obj){setAlerts(obj);localStorage.setItem('mc_alerts',JSON.stringify(obj));};
  var removeItem=function(ticker){saveWl(wl.filter(function(x){return x.ticker!==ticker;}));};

  var openAlert=function(item){
    setAlertItem(item.ticker);
    var a=alerts[item.ticker]||{};
    setALow(a.low!=null?String(a.low):'');
    setAHigh(a.high!=null?String(a.high):'');
  };
  var saveAlert=function(){
    var obj=Object.assign({},alerts);
    obj[alertItem]={low:aLow!==''?Number(aLow):null,high:aHigh!==''?Number(aHigh):null};
    saveAlerts(obj);setAlertItem(null);
  };
  var removeAlert=function(ticker){
    var obj=Object.assign({},alerts);delete obj[ticker];saveAlerts(obj);
  };

  var refreshPrices=function(){
    if(!wl.length)return;
    var KEY=localStorage.getItem('mc_finnhub_key');
    if(!KEY)return;
    setFetching(true);
    var FH='https://finnhub.io/api/v1';
    var results={};
    var promises=wl.map(function(item){
      if(item.isCrypto){
        var sym='BINANCE:'+item.ticker+'USDT';
        var now=Math.floor(Date.now()/1000);
        var from=now-2*86400;
        return window.fetch(FH+'/crypto/candle?symbol='+sym+'&resolution=D&from='+from+'&to='+now+'&token='+KEY)
          .then(function(r){return r.json();})
          .then(function(cd){
            if(cd&&cd.s==='ok'&&cd.c&&cd.c.length>0){
              var last=cd.c.length-1;
              var pr=cd.c[last];
              var prev=last>0?cd.c[last-1]:cd.o[last];
              results[item.ticker]={price:pr,chgPct:prev>0?((pr-prev)/prev*100):0};
            }
          }).catch(function(){});
      }else{
        return window.fetch(FH+'/quote?symbol='+item.ticker+'&token='+KEY)
          .then(function(r){return r.json();})
          .then(function(qt){
            if(qt&&qt.c){results[item.ticker]={price:qt.c,chgPct:qt.pc>0?((qt.c-qt.pc)/qt.pc*100):0};}
          }).catch(function(){});
      }
    });
    Promise.all(promises).then(function(){setPrices(results);setFetching(false);});
  };

  useEffect(function(){refreshPrices();},[]);

  var triggeredAlerts=wl.filter(function(item){
    var p=prices[item.ticker];var a=alerts[item.ticker];
    if(!p||!a)return false;
    return(a.low!=null&&p.price<=a.low)||(a.high!=null&&p.price>=a.high);
  });

  var getSectorCat=function(item){
    if(item.isCrypto)return'cripto';
    var sec=(item.sector||'').toLowerCase();
    if(item.isETF){
      if(sec.includes('bono')||sec.includes('bond')||sec.includes('treasury')||sec.includes('fixed'))return'bonos';
      if(sec.includes('oro')||sec.includes('gold')||sec.includes('commod'))return'alternativo';
      return'etf';
    }
    if(sec.includes('tech')||sec.includes('semicon')||sec.includes('software')||sec.includes('hardware')||sec.includes('internet'))return'tech';
    if(sec.includes('health')||sec.includes('pharma')||sec.includes('bio')||sec.includes('salud'))return'salud';
    if(sec.includes('financ')||sec.includes('bank')||sec.includes('insurance'))return'financiero';
    if(sec.includes('energy')||sec.includes('oil')||sec.includes('gas'))return'energia';
    if(sec.includes('consumer')||sec.includes('retail')||sec.includes('defensiv'))return'consumo';
    if(sec.includes('real estate')||sec.includes('reit'))return'inmobiliario';
    return'otros';
  };
  var catMeta={
    tech:{label:'Tecnología / IA',color:'#5B8DEF',icon:'💻'},
    etf:{label:'ETFs Diversificados',color:C.mint,icon:'📦'},
    cripto:{label:'Criptoactivos',color:'#A78BFA',icon:'🪙'},
    salud:{label:'Salud / Farma',color:'#34D399',icon:'🏥'},
    financiero:{label:'Financiero / Bancos',color:'#F5C518',icon:'🏦'},
    bonos:{label:'Bonos / Renta Fija',color:'#94A3B8',icon:'📜'},
    energia:{label:'Energía',color:'#E8845C',icon:'⚡'},
    consumo:{label:'Consumo',color:'#F472B6',icon:'🛒'},
    alternativo:{label:'Alternativo / Oro',color:'#FBBF24',icon:'🥇'},
    inmobiliario:{label:'Inmobiliario',color:'#6EE7B7',icon:'🏠'},
    otros:{label:'Otros',color:C.tf,icon:'📎'},
  };

  var total=wl.length;
  var concMap={};
  wl.forEach(function(item){var cat=getSectorCat(item);concMap[cat]=(concMap[cat]||0)+1;});

  var concWarnings=[];
  Object.keys(concMap).forEach(function(cat){
    var pct=Math.round((concMap[cat]/total)*100);
    if(cat==='tech'&&pct>=60)concWarnings.push({msg:'Concentración muy alta en Tecnología/IA ('+pct+'%) — considera diversificar',color:C.red});
    else if(cat==='tech'&&pct>=40)concWarnings.push({msg:'Concentración moderada en Tecnología/IA ('+pct+'%)',color:'#F5C518'});
    if(cat==='cripto'&&pct>=40)concWarnings.push({msg:'Alta exposición a criptoactivos ('+pct+'%) — activos muy volátiles',color:C.red});
    else if(cat==='cripto'&&pct>=25)concWarnings.push({msg:'Exposición cripto moderada ('+pct+'%) — revisa tu tolerancia al riesgo',color:'#F5C518'});
  });
  if(!concMap['bonos']&&!concMap['etf']&&total>=4)concWarnings.push({msg:'Sin ETFs diversificados ni renta fija — poca protección ante caídas',color:'#F5C518'});

  var PLANS={
    'conservador': {etf:60,acciones:25,cripto:5, bonos:10,color:C.mint,label:'Conservador',emoji:'🛡'},
    'moderado':    {etf:45,acciones:30,cripto:10,bonos:15,color:C.blue,label:'Moderado',emoji:'⚖️'},
    'mod-agresivo':{etf:30,acciones:45,cripto:20,bonos:5, color:'#F5C518',label:'Mod. Agresivo',emoji:'📈'},
    'agresivo':    {etf:15,acciones:55,cripto:30,bonos:0, color:C.red,label:'Agresivo',emoji:'🚀'},
  };
  var plan=PLANS[profile]||PLANS['moderado'];
  var hasETF=wl.filter(function(x){return x.isETF;}).length;
  var hasStocks=wl.filter(function(x){return !x.isETF&&!x.isCrypto;}).length;
  var hasCrypto=wl.filter(function(x){return x.isCrypto;}).length;
  var hasBonds=wl.filter(function(x){return(x.sector||'').toLowerCase().includes('bond')||(x.sector||'').toLowerCase().includes('bono');}).length;

  var fmtP=function(price){
    if(price==null||price===0)return'—';
    if(price>=1000)return'$'+Number(price).toFixed(0);
    if(price>=1)return'$'+Number(price).toFixed(2);
    return'$'+Number(price).toFixed(4);
  };

  return(
    <div style={{maxWidth:1100,margin:'0 auto',padding:'32px 20px'}}>
      <ModHeader eyebrow="08 · Portafolio" title="Lista de Seguimiento" body="Agrega activos desde el Explorador y monitorea tu portafolio personal en tiempo real. Tú siempre decides."/>

      {/* ── Alerta de precio activada ── */}
      {triggeredAlerts.length>0&&(
        <div style={{padding:'14px 18px',borderRadius:10,background:'rgba(224,93,93,0.1)',border:`1px solid ${C.red}`,marginBottom:20,display:'flex',alignItems:'flex-start',gap:12}}>
          <span style={{fontSize:20,flexShrink:0}}>🚨</span>
          <div>
            <p style={{margin:'0 0 6px',fontWeight:600,color:C.red,fontSize:14}}>Alertas de precio activadas</p>
            {triggeredAlerts.map(function(item){
              var p=prices[item.ticker];var a=alerts[item.ticker];
              var msgs=[];
              if(a.low!=null&&p.price<=a.low)msgs.push('cayó al mínimo de alerta ($'+a.low+')');
              if(a.high!=null&&p.price>=a.high)msgs.push('alcanzó el máximo de alerta ($'+a.high+')');
              return React.createElement('p',{key:item.ticker,style:{margin:'2px 0',fontSize:13,color:C.td}},
                React.createElement('span',{style:{color:C.t,fontWeight:600}},item.ticker+': '),
                msgs.join(' y ')+' · Precio actual: '+fmtP(p.price)
              );
            })}
          </div>
        </div>
      )}

      {!localStorage.getItem('mc_finnhub_key')&&(
        <div style={{padding:'12px 16px',borderRadius:10,background:'rgba(245,197,24,0.07)',border:'1px solid #7A6010',marginBottom:20}}>
          <p style={{margin:0,fontSize:13,color:'#F5C518'}}>⚠ Necesitas una clave Finnhub para ver precios en vivo. Introdúcela en el Explorador.</p>
        </div>
      )}

      {/* ── Barra de concentración ── */}
      {total>0&&(
        <div style={{padding:'18px 22px',borderRadius:14,background:C.s,border:`1px solid ${C.line}`,marginBottom:20}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
            <p style={{margin:0,fontSize:13,fontWeight:600,color:C.t}}>Diversificación de la lista</p>
            <span style={{fontSize:12,color:C.tf}}>{total} activo{total!==1?'s':''}</span>
          </div>
          <div style={{display:'flex',height:10,borderRadius:5,overflow:'hidden',gap:2,marginBottom:10}}>
            {Object.keys(concMap).map(function(cat){
              var pct=(concMap[cat]/total)*100;
              var meta=catMeta[cat]||catMeta['otros'];
              return React.createElement('div',{key:cat,style:{width:pct+'%',background:meta.color,transition:'width 0.4s',minWidth:pct>0?4:0}});
            })}
          </div>
          <div style={{display:'flex',flexWrap:'wrap',gap:10,marginBottom:concWarnings.length>0?10:0}}>
            {Object.keys(concMap).map(function(cat){
              var pct=Math.round((concMap[cat]/total)*100);
              var meta=catMeta[cat]||catMeta['otros'];
              return React.createElement('div',{key:cat,style:{display:'flex',alignItems:'center',gap:5,fontSize:12}},
                React.createElement('span',{style:{width:8,height:8,borderRadius:2,background:meta.color,display:'inline-block',flexShrink:0}}),
                React.createElement('span',{style:{color:C.td}},meta.icon+' '+meta.label+' '),
                React.createElement('span',{className:'mono',style:{color:C.t,fontWeight:600}},pct+'%')
              );
            })}
          </div>
          {concWarnings.length>0?(
            <div style={{display:'flex',flexDirection:'column',gap:5}}>
              {concWarnings.map(function(w,i){
                return React.createElement('p',{key:i,style:{margin:0,fontSize:12.5,color:w.color,display:'flex',alignItems:'center',gap:6}},
                  w.color===C.red?'🔴 ':'🟡 ',w.msg
                );
              })}
            </div>
          ):total>=3&&(
            <p style={{margin:0,fontSize:12.5,color:C.mint}}>🟢 Diversificación saludable</p>
          )}
        </div>
      )}

      {/* ── Tabla principal ── */}
      <div style={{marginBottom:24}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
          <h3 style={{margin:0,fontSize:15,fontWeight:600}}>Activos en seguimiento</h3>
          {wl.length>0&&(
            <button onClick={refreshPrices} disabled={fetching} style={{padding:'7px 14px',borderRadius:8,border:`1px solid ${C.line}`,background:'transparent',color:fetching?C.tf:C.mint,fontSize:12.5,cursor:'pointer'}}>
              {fetching?'Actualizando…':'↻ Actualizar precios'}
            </button>
          )}
        </div>
        {wl.length===0?(
          <div style={{padding:'48px 24px',borderRadius:14,background:C.s,border:`1px dashed ${C.line}`,textAlign:'center'}}>
            <p style={{fontSize:32,marginBottom:12}}>📋</p>
            <p style={{fontSize:15,fontWeight:500,margin:'0 0 8px'}}>Lista vacía</p>
            <p style={{fontSize:13,color:C.td,margin:0}}>Busca cualquier acción, ETF o cripto en el <strong style={{color:C.t}}>Explorador</strong> y pulsa <strong style={{color:C.mint}}>+ Agregar a Seguimiento</strong>.</p>
          </div>

          <div style={{borderRadius:14,border:`1px solid ${C.line}`,overflow:'hidden'}}>
            <div style={{display:'grid',gridTemplateColumns:'80px 1fr 110px 90px 90px 80px',gap:12,padding:'10px 16px',background:C.s2,borderBottom:`1px solid ${C.line}`}}>
              {['Ticker','Nombre / Sector','Precio','Cambio hoy','Tipo','Acciones'].map(function(h){
                return React.createElement('span',{key:h,style:{fontSize:11,color:C.tf,fontWeight:600,textTransform:'uppercase',letterSpacing:'0.06em'}},h);

              var price=pd?pd.price:null;
              var chgPct=pd?pd.chgPct:null;
              var chgPos=chgPct!=null?chgPct>=0:true;
              var hasAlert=alerts[item.ticker]&&(alerts[item.ticker].low!=null||alerts[item.ticker].high!=null);
              var isTriggered=triggeredAlerts.some(function(x){return x.ticker===item.ticker;});
              var typeLabel=item.isCrypto?'Cripto':item.isETF?'ETF':'Acción';
              var typeColor=item.isCrypto?'#A78BFA':item.isETF?C.mint:C.blue;
              var isFalling=chgPct!=null&&chgPct<=-2&&!item.isCrypto;
              return React.createElement('div',{key:item.ticker,style:{display:'grid',gridTemplateColumns:'80px 1fr 110px 90px 90px 80px',gap:12,padding:'13px 16px',borderBottom:idx<wl.length-1?`1px solid ${C.line}`:'none',background:isTriggered?'rgba(224,93,93,0.04)':'transparent',alignItems:'center'}},

                    alerts[item.ticker].high!=null?React.createElement('span',{style:{fontSize:10,fontFamily:'monospace',fontWeight:600,color:isTriggered&&alerts[item.ticker].high!=null&&prices[item.ticker]&&prices[item.ticker].price>=alerts[item.ticker].high?C.red:'#F5C518',background:isTriggered?'rgba(224,93,93,0.1)':'rgba(245,197,24,0.08)',border:'1px solid '+(isTriggered?'rgba(224,93,93,0.3)':'rgba(245,197,24,0.3)'),padding:'1px 6px',borderRadius:4}},'↑ $'+alerts[item.ticker].high):null
                  ):null
                ),
                React.createElement('div',null,
                  React.createElement('p',{className:'mono',style:{margin:'0 0 1px',fontSize:14,fontWeight:600,color:C.t}},fetching?'…':fmtP(price)),
                  isFalling&&React.createElement('span',{style:{fontSize:10,color:C.red,fontWeight:600}},'↓ Cayendo')
                ),
                React.createElement('span',{className:'mono',style:{fontSize:13,fontWeight:600,color:fetching?C.tf:chgPos?C.mint:C.red}},
                  fetching?'…':chgPct!=null?((chgPct>=0?'+':'')+chgPct.toFixed(2)+'%'):'—'
                ),
                React.createElement('span',{style:{fontSize:12,color:typeColor,border:`1px solid ${typeColor}33`,borderRadius:4,padding:'3px 8px',display:'inline-block',whiteSpace:'nowrap'}},typeLabel),
                React.createElement('div',{style:{display:'flex',gap:6,alignItems:'center'}},
                  React.createElement('button',{onClick:function(){openAlert(item);},title:hasAlert?'Editar alerta':'Crear alerta de precio',
                    style:{padding:'5px 6px',borderRadius:6,border:`1px solid ${isTriggered?C.red:hasAlert?'#F5C518':C.line}`,background:isTriggered?'rgba(224,93,93,0.12)':hasAlert?'rgba(245,197,24,0.08)':'transparent',cursor:'pointer',fontSize:13,lineHeight:1,color:isTriggered?C.red:hasAlert?'#F5C518':C.tf}
                  },isTriggered?'🚨':'🔔'),
                  React.createElement('button',{onClick:function(){removeItem(item.ticker);},title:'Eliminar de la lista',
                    style:{padding:'5px 6px',borderRadius:6,border:`1px solid ${C.line}`,background:'transparent',cursor:'pointer',fontSize:12,color:C.tf,lineHeight:1}
                  },'✕')
                )
              );
            })}
          </div>
        )}
      </div>

      {/* ── Modal alerta ── */}
      {alertItem&&(
        <div style={{position:'fixed',top:0,left:0,right:0,bottom:0,background:'rgba(0,0,0,0.65)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:200}}
          onClick={function(e){if(e.target===e.currentTarget)setAlertItem(null);}}>
          <div style={{width:'100%',maxWidth:380,padding:'28px',borderRadius:16,background:'#1A2133',border:`1px solid ${C.line}`}} onClick={function(e){e.stopPropagation();}}>
            <h3 style={{margin:'0 0 6px',fontSize:17,fontWeight:600}}>🔔 Alerta de precio — {alertItem}</h3>
            <p style={{margin:'0 0 20px',fontSize:13,color:C.tf}}>Recibirás una alerta visual la próxima vez que abras esta sección con el activo en la lista.</p>
            <label style={{display:'block',marginBottom:14}}>
              <p style={{margin:'0 0 6px',fontSize:11.5,color:C.td,textTransform:'uppercase',letterSpacing:'0.07em'}}>Alerta si el precio baja de ($)</p>
              <input type="number" value={aLow} onChange={function(e){setALow(e.target.value);}} placeholder="Ej: 180.00" min="0"
                style={{width:'100%',padding:'10px 12px',borderRadius:8,border:`1px solid ${C.line}`,background:C.s2,color:C.t,fontSize:14,boxSizing:'border-box',outline:'none'}}/>
            </label>
            <label style={{display:'block',marginBottom:22}}>
              <p style={{margin:'0 0 6px',fontSize:11.5,color:C.td,textTransform:'uppercase',letterSpacing:'0.07em'}}>Alerta si el precio sube de ($)</p>
              <input type="number" value={aHigh} onChange={function(e){setAHigh(e.target.value);}} placeholder="Ej: 250.00" min="0"
                style={{width:'100%',padding:'10px 12px',borderRadius:8,border:`1px solid ${C.line}`,background:C.s2,color:C.t,fontSize:14,boxSizing:'border-box',outline:'none'}}/>
            </label>
            <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
              <button onClick={saveAlert} style={{flex:1,padding:'11px',borderRadius:8,border:'none',background:C.mint,color:'#051A0F',fontSize:14,fontWeight:700,cursor:'pointer',minWidth:100}}>Guardar alerta</button>
              {alerts[alertItem]&&(alerts[alertItem].low!=null||alerts[alertItem].high!=null)&&(
                <button onClick={function(){removeAlert(alertItem);setAlertItem(null);}} style={{padding:'11px 14px',borderRadius:8,border:`1px solid ${C.line}`,background:'transparent',color:C.tf,fontSize:13,cursor:'pointer'}}>Eliminar</button>
              )}
              <button onClick={function(){setAlertItem(null);}} style={{padding:'11px 14px',borderRadius:8,border:`1px solid ${C.line}`,background:'transparent',color:C.tf,fontSize:13,cursor:'pointer'}}>Cancelar</button>
            </div>

      {/* ── Plan de inversión ── */}
      <div style={{padding:'22px 24px',borderRadius:14,background:C.s,border:`1px solid ${C.line}`}}>
        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:6}}>
          <span style={{fontSize:22}}>{plan.emoji}</span>
          <div style={{flex:1}}>
            <p style={{margin:'0 0 1px',fontSize:11,color:C.tf,textTransform:'uppercase',letterSpacing:'0.08em'}}>Tu perfil de inversión</p>
            <p style={{margin:0,fontSize:15,fontWeight:700,color:plan.color}}>{plan.label}</p>
          </div>
          {!localStorage.getItem('mc_profile')&&(
            <span style={{fontSize:12,color:'#F5C518',border:'1px solid #7A6010',borderRadius:6,padding:'3px 8px'}}>Completa el Cuestionario para personalizar</span>
          )}
        </div>
        <p style={{margin:'0 0 16px',fontSize:13,color:C.td}}>Asignación de referencia para tu perfil — tú siempre decides cuánto y cuándo.</p>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(130px,1fr))',gap:10}}>
          {[
            {k:'etf',label:'ETFs',pct:plan.etf,icon:'📦',color:C.mint,count:hasETF},
            {k:'acciones',label:'Acciones',pct:plan.acciones,icon:'📈',color:C.blue,count:hasStocks},
            {k:'cripto',label:'Cripto',pct:plan.cripto,icon:'🪙',color:'#A78BFA',count:hasCrypto},
            {k:'bonos',label:'Renta Fija',pct:plan.bonos,icon:'📜',color:'#94A3B8',count:hasBonds},
          ].map(function(cat){
            var statusColor=cat.count>0?C.mint:(cat.pct===0?C.tf:'#F5C518');
            var statusMsg=cat.count>0?cat.count+' en lista':(cat.pct===0?'No requerido':'Sin activos todavía');
            return React.createElement('div',{key:cat.k,style:{padding:'14px',borderRadius:10,background:C.s2,border:`1px solid ${C.line}`}},
              React.createElement('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}},

                React.createElement('span',{className:'mono',style:{fontSize:22,fontWeight:700,color:cat.color}},cat.pct+'%')
              ),
              React.createElement('p',{style:{margin:'0 0 5px',fontSize:13,fontWeight:600,color:C.t}},cat.label),
              React.createElement('p',{style:{margin:0,fontSize:11,color:statusColor}},statusMsg)
            );

        </div>
        <p style={{margin:'14px 0 0',fontSize:12,color:C.tf,lineHeight:1.6}}>
          ⚠ Esto es contenido educativo, no asesoramiento financiero. La decisión de inversión siempre es tuya.
        </p>
      </div>
    </div>
  );
}

// ─── SIMULATOR ────────────────────────────────────────────────────────────────
function Simulator(){
  const SIM_START=10000;
  const [cash,setCash]=useState(()=>{const s=localStorage.getItem('mc_sim_cash');return s?parseFloat(s):SIM_START;});
  const [positions,setPositions]=useState(()=>{try{return JSON.parse(localStorage.getItem('mc_sim_pos')||'[]');}catch(e){return [];}});
  const [history,setHistory]=useState(()=>{try{return JSON.parse(localStorage.getItem('mc_sim_hist')||'[]');}catch(e){return [];}});
  const [sym,setSym]=useState('');
  const [qty,setQty]=useState('1');
  const [price,setPrice]=useState(null);
  const [fetching,setFetching]=useState(false);
  const [err,setErr]=useState('');
  const [tab,setTab]=useState('portfolio');
  const [livePrices,setLivePrices]=useState({});
  const [refreshing,setRefreshing]=useState(false);

  useEffect(()=>{localStorage.setItem('mc_sim_cash',cash);},[cash]);
  useEffect(()=>{localStorage.setItem('mc_sim_pos',JSON.stringify(positions));},[positions]);
  useEffect(()=>{localStorage.setItem('mc_sim_hist',JSON.stringify(history));},[history]);

  const getKey=()=>{
    const dk='d8ul8apr01qrt65sjsvgd8ul8apr01qrt65sjt00';
    const old='d8rik39r01qnkitnbb8g';
    let k=localStorage.getItem('mc_finnhub_key');
    if(!k||k===old){localStorage.setItem('mc_finnhub_key',dk);k=dk;}
    return k;
  };

  const fetchPrice=async(ticker)=>{
    if(!ticker)return;
    setFetching(true);setErr('');setPrice(null);
    try{
      const r=await fetch(`https://finnhub.io/api/v1/quote?symbol=${ticker.toUpperCase()}&token=${getKey()}`);
      const d=await r.json();
      if(d.c&&d.c>0){setPrice(d.c);}
      else{setErr('Ticker no encontrado o mercado cerrado');}
    }catch(e){setErr('Error de conexión');}
    setFetching(false);
  };

  const refreshPrices=async()=>{
    if(positions.length===0)return;
    setRefreshing(true);
    const np={};
    for(const pos of positions){
      try{
        const r=await fetch(`https://finnhub.io/api/v1/quote?symbol=${pos.ticker}&token=${getKey()}`);
        const d=await r.json();
        if(d.c>0)np[pos.ticker]=d.c;
      }catch(e){}
    }
    setLivePrices(p=>({...p,...np}));
    setRefreshing(false);
  };

  useEffect(()=>{if(positions.length>0)refreshPrices();},[]);

  const buy=()=>{
    if(!price||!qty||parseFloat(qty)<=0){setErr('Cantidad inválida');return;}
    const total=parseFloat((price*parseFloat(qty)).toFixed(2));
    if(total>cash){setErr('Saldo insuficiente');return;}
    const t=sym.toUpperCase();
    setCash(c=>parseFloat((c-total).toFixed(2)));
    setPositions(prev=>{
      const ex=prev.find(p=>p.ticker===t);
      if(ex){
        const nq=ex.qty+parseFloat(qty);
        const na=((ex.avgCost*ex.qty)+total)/nq;
        return prev.map(p=>p.ticker===t?{...p,qty:parseFloat(nq.toFixed(6)),avgCost:parseFloat(na.toFixed(4))}:p);
      }
      return [...prev,{ticker:t,qty:parseFloat(parseFloat(qty).toFixed(6)),avgCost:price}];
    });
    setHistory(h=>[{date:new Date().toISOString(),action:'COMPRA',ticker:t,qty:parseFloat(qty),price,total},...h]);
    setLivePrices(p=>({...p,[t]:price}));
    setErr('');
  };

  const sell=(ticker,sellAll)=>{
    const pos=positions.find(p=>p.ticker===ticker);
    if(!pos)return;
    const sp=livePrices[ticker]||pos.avgCost;
    const sq=sellAll?pos.qty:pos.qty;
    const total=parseFloat((sp*sq).toFixed(2));
    setCash(c=>parseFloat((c+total).toFixed(2)));
    setPositions(prev=>prev.filter(p=>p.ticker!==ticker));
    setHistory(h=>[{date:new Date().toISOString(),action:'VENTA',ticker,qty:sq,price:sp,total},...h]);
  };

  const reset=()=>{
    if(!confirm('¿Reiniciar el simulador? Se perderá todo el historial y posiciones.'))return;
    setCash(SIM_START);setPositions([]);setHistory([]);setLivePrices({});
  };

  const fmtUSD=n=>n!=null?'$'+parseFloat(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}):'—';

  const portfolioValue=positions.reduce((s,p)=>{const lp=livePrices[p.ticker]||p.avgCost;return s+lp*p.qty;},0);
  const totalValue=cash+portfolioValue;
  const pnl=totalValue-SIM_START;
  const pnlPct=(pnl/SIM_START)*100;

  return(
    <div style={{maxWidth:1100,margin:'0 auto',padding:'32px 20px'}}>
      <div style={{marginBottom:24}}>
        <h2 className="serif" style={{fontSize:26,fontWeight:600,marginBottom:6}}>📈 Simulador de Inversiones</h2>
        <p style={{color:C.tf,fontSize:13,margin:0}}>Opera con ${SIM_START.toLocaleString()} virtuales usando precios reales. Sin riesgo — resultados reales.</p>
      </div>

      {/* Summary */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(175px,1fr))',gap:12,marginBottom:24}}>
        {[
          {label:'Capital total',val:fmtUSD(totalValue),sub:'Efectivo + posiciones',color:C.t},
          {label:'Efectivo disponible',val:fmtUSD(cash),sub:'Para nuevas compras',color:C.mint},
          {label:'En posiciones',val:fmtUSD(portfolioValue),sub:positions.length+' posición(es)',color:C.blue},
          {label:'Ganancia / Pérdida',val:(pnl>=0?'+':'')+fmtUSD(pnl),sub:(pnlPct>=0?'+':'')+pnlPct.toFixed(2)+'% vs inicio',color:pnl>=0?C.mint:C.red},
        ].map(card=>(
          <div key={card.label} style={{padding:'16px',borderRadius:12,background:C.s,border:`1px solid ${C.line}`}}>
            <p style={{margin:'0 0 5px',fontSize:11,color:C.tf,textTransform:'uppercase',letterSpacing:'0.07em'}}>{card.label}</p>
            <p className="mono" style={{margin:'0 0 2px',fontSize:19,fontWeight:700,color:card.color}}>{card.val}</p>
            <p style={{margin:0,fontSize:11,color:C.tf}}>{card.sub}</p>
          </div>
        ))}
      </div>

      {/* Trade panel */}
      <div style={{padding:'20px',borderRadius:14,background:C.s,border:`1px solid ${C.line}`,marginBottom:20}}>
        <p style={{margin:'0 0 14px',fontSize:13,fontWeight:600}}>Nueva Operación</p>
        <div style={{display:'flex',gap:10,flexWrap:'wrap',alignItems:'flex-end'}}>
          <div style={{flex:'2 1 150px'}}>
            <p style={{margin:'0 0 5px',fontSize:11,color:C.tf,textTransform:'uppercase',letterSpacing:'0.07em'}}>Ticker</p>
            <input value={sym} onChange={e=>setSym(e.target.value.toUpperCase())}
              onKeyDown={e=>e.key==='Enter'&&fetchPrice(sym)}
              placeholder="AAPL, BTC-USD, SPY..."
              style={{width:'100%',padding:'10px 12px',borderRadius:8,border:`1px solid ${C.line}`,background:C.s2,color:C.t,fontSize:14,boxSizing:'border-box',outline:'none'}}/>
          </div>
          <div style={{flex:'1 1 80px'}}>
            <p style={{margin:'0 0 5px',fontSize:11,color:C.tf,textTransform:'uppercase',letterSpacing:'0.07em'}}>Cantidad</p>
            <input type="number" value={qty} onChange={e=>setQty(e.target.value)} min="0.001" step="0.001"
              style={{width:'100%',padding:'10px 12px',borderRadius:8,border:`1px solid ${C.line}`,background:C.s2,color:C.t,fontSize:14,boxSizing:'border-box',outline:'none'}}/>
          </div>
          <button onClick={()=>fetchPrice(sym)} disabled={fetching||!sym}
            style={{padding:'10px 18px',borderRadius:8,border:`1px solid ${C.line}`,background:'transparent',color:C.mint,fontSize:13,cursor:'pointer',flexShrink:0}}>
            {fetching?'Buscando…':'Obtener precio'}
          </button>
          {price&&(
            <button onClick={buy}
              style={{padding:'10px 20px',borderRadius:8,border:'none',background:C.mint,color:'#051A0F',fontSize:14,fontWeight:700,cursor:'pointer',flexShrink:0}}>
              Comprar · {fmtUSD(price*parseFloat(qty||0))}
            </button>
          )}
        </div>
        {price&&(
          <p style={{margin:'10px 0 0',fontSize:13,color:C.tf}}>
            Precio: <span className="mono" style={{color:C.mint,fontWeight:600}}>{fmtUSD(price)}</span>
            {' '}· Total: <span className="mono" style={{color:C.t,fontWeight:600}}>{fmtUSD(price*parseFloat(qty||0))}</span>
            {' '}· Saldo tras compra: <span className="mono" style={{color:cash-price*parseFloat(qty||0)>=0?C.mint:C.red,fontWeight:600}}>{fmtUSD(cash-price*parseFloat(qty||0))}</span>
          </p>
        )}
        {err&&<p style={{margin:'10px 0 0',fontSize:13,color:C.red}}>{err}</p>}
      </div>

      {/* Tabs */}
      <div style={{display:'flex',gap:4,marginBottom:16,alignItems:'center'}}>
        {[['portfolio','📊 Posiciones'],['history','📋 Historial']].map(([id,label])=>(
          <button key={id} onClick={()=>setTab(id)}
            style={{padding:'8px 16px',borderRadius:8,border:'none',background:tab===id?C.s2:'transparent',color:tab===id?C.mint:C.td,fontSize:13,fontWeight:tab===id?600:400,cursor:'pointer'}}>
            {label}
          </button>
        ))}
        <div style={{flex:1}}/>
        <button onClick={refreshPrices} disabled={refreshing}
          style={{padding:'7px 14px',borderRadius:8,border:`1px solid ${C.line}`,background:'transparent',color:C.tf,fontSize:12,cursor:'pointer'}}>
          {refreshing?'Actualizando…':'↻ Actualizar precios'}
        </button>
        <button onClick={reset}
          style={{padding:'7px 14px',borderRadius:8,border:`1px solid rgba(224,93,93,0.4)`,background:'transparent',color:C.red,fontSize:12,cursor:'pointer'}}>
          Reiniciar
        </button>
      </div>

      {/* Portfolio tab */}
      {tab==='portfolio'&&(
        positions.length===0?(
          <div style={{padding:'48px 24px',borderRadius:14,background:C.s,border:`1px dashed ${C.line}`,textAlign:'center'}}>
            <p style={{fontSize:32,marginBottom:12}}>📊</p>
            <p style={{fontSize:15,fontWeight:500,margin:'0 0 8px'}}>Sin posiciones abiertas</p>
            <p style={{fontSize:13,color:C.td,margin:0}}>Busca un ticker arriba y haz tu primera compra virtual.</p>
          </div>
        ):(
          <div style={{borderRadius:14,border:`1px solid ${C.line}`,overflow:'hidden'}}>
            <div style={{display:'grid',gridTemplateColumns:'90px 90px 120px 120px 110px 120px 90px',gap:8,padding:'10px 16px',background:C.s2,borderBottom:`1px solid ${C.line}`}}>
              {['Ticker','Cantidad','Precio Compra','Precio Actual','Valor','P&L',''].map(h=>(
                <span key={h} style={{fontSize:11,color:C.tf,fontWeight:600,textTransform:'uppercase',letterSpacing:'0.06em'}}>{h}</span>
              ))}
            </div>
            {positions.map((pos,i)=>{
              const lp=livePrices[pos.ticker]||pos.avgCost;
              const val=lp*pos.qty;
              const posP=(lp-pos.avgCost)*pos.qty;
              const posP_pct=((lp-pos.avgCost)/pos.avgCost)*100;
              return(
                <div key={pos.ticker} style={{display:'grid',gridTemplateColumns:'90px 90px 120px 120px 110px 120px 90px',gap:8,padding:'13px 16px',borderBottom:i<positions.length-1?`1px solid ${C.line}`:'none',alignItems:'center'}}>
                  <span className="mono" style={{fontSize:14,fontWeight:700,color:C.mint}}>{pos.ticker}</span>
                  <span className="mono" style={{fontSize:13,color:C.t}}>{pos.qty}</span>
                  <span className="mono" style={{fontSize:13,color:C.tf}}>{fmtUSD(pos.avgCost)}</span>
                  <span className="mono" style={{fontSize:13,color:C.t,fontWeight:600}}>{fmtUSD(lp)}</span>
                  <span className="mono" style={{fontSize:13,fontWeight:600,color:C.t}}>{fmtUSD(val)}</span>
                  <div>
                    <p className="mono" style={{margin:0,fontSize:13,fontWeight:700,color:posP>=0?C.mint:C.red}}>{(posP>=0?'+':'')+fmtUSD(posP)}</p>
                    <p className="mono" style={{margin:0,fontSize:11,color:posP>=0?C.mint:C.red}}>{(posP_pct>=0?'+':'')+posP_pct.toFixed(2)+'%'}</p>
                  </div>
                  <button onClick={()=>sell(pos.ticker,true)}
                    style={{padding:'6px 10px',borderRadius:6,border:`1px solid rgba(224,93,93,0.4)`,background:'transparent',color:C.red,fontSize:12,cursor:'pointer'}}>
                    Vender
                  </button>
                </div>
              );
            })}
          </div>
        )
      )}

      {/* History tab */}
      {tab==='history'&&(
        history.length===0?(
          <div style={{padding:'48px 24px',borderRadius:14,background:C.s,border:`1px dashed ${C.line}`,textAlign:'center'}}>
            <p style={{fontSize:32,marginBottom:12}}>📋</p>
            <p style={{fontSize:15,fontWeight:500,margin:'0 0 8px'}}>Sin operaciones todavía</p>
            <p style={{fontSize:13,color:C.td,margin:0}}>Tu historial de compras y ventas aparecerá aquí.</p>
          </div>
        ):(
          <div style={{borderRadius:14,border:`1px solid ${C.line}`,overflow:'hidden'}}>
            <div style={{display:'grid',gridTemplateColumns:'150px 80px 90px 90px 100px 110px',gap:8,padding:'10px 16px',background:C.s2,borderBottom:`1px solid ${C.line}`}}>
              {['Fecha','Tipo','Ticker','Cantidad','Precio','Total'].map(h=>(
                <span key={h} style={{fontSize:11,color:C.tf,fontWeight:600,textTransform:'uppercase',letterSpacing:'0.06em'}}>{h}</span>
              ))}
            </div>
            {history.map((tr,i)=>(
              <div key={i} style={{display:'grid',gridTemplateColumns:'150px 80px 90px 90px 100px 110px',gap:8,padding:'11px 16px',borderBottom:i<history.length-1?`1px solid ${C.line}`:'none',alignItems:'center'}}>
                <span style={{fontSize:12,color:C.tf}}>{new Date(tr.date).toLocaleString('es',{dateStyle:'short',timeStyle:'short'})}</span>
                <span style={{fontSize:12,fontWeight:700,color:tr.action==='COMPRA'?C.mint:C.red,border:`1px solid ${tr.action==='COMPRA'?C.mint:C.red}33`,borderRadius:4,padding:'2px 7px',display:'inline-block'}}>{tr.action}</span>
                <span className="mono" style={{fontSize:13,fontWeight:700,color:C.t}}>{tr.ticker}</span>
                <span className="mono" style={{fontSize:13,color:C.tf}}>{tr.qty}</span>
                <span className="mono" style={{fontSize:13,color:C.tf}}>{fmtUSD(tr.price)}</span>
                <span className="mono" style={{fontSize:13,fontWeight:600,color:C.t}}>{fmtUSD(tr.total)}</span>
              </div>
            ))}
          </div>
        )
      )}
    </div>
  );
}

function App(){

  const [page,setPage]=useState('home');
  const [pendingTicker,setPendingTicker]=useState('');
  const t=STR[lang];

  useEffect(()=>{
    const ls=document.getElementById('ls');
    if(ls){ls.style.opacity='0';setTimeout(()=>ls.style.display='none',400);}
  },[]);

  const nav=[
    {id:'home',e:'🏠',l:t.nav.home},

    {id:'explorer',e:'🔍',l:t.nav.explorer},
    {id:'glossary',e:'📖',l:t.nav.glossary},
    {id:'checklist',e:'✅',l:t.nav.checklist},
    {id:'portafolio',e:'📋',l:t.nav.portafolio},
    {id:'simulador',e:'📈',l:'Simulador'},
    {id:'risk',e:'🛡️',l:t.nav.risk},
    {id:'calc',e:'🧮',l:t.nav.calc},
  ];

  return(
    <div style={{minHeight:'100vh',background:C.bg,color:C.t}}>
      <header style={{borderBottom:`1px solid ${C.line}`,position:'sticky',top:0,background:'rgba(14,17,23,0.95)',backdropFilter:'blur(10px)',zIndex:40}}>
        <div style={{maxWidth:1100,margin:'0 auto',padding:'12px 20px',display:'flex',alignItems:'center',gap:12}}>
          <div onClick={()=>setPage('home')} style={{cursor:'pointer',display:'flex',alignItems:'center',gap:10,flexShrink:0,marginRight:8}}>
            <Logo/>
            <span className="serif" style={{fontSize:18,fontWeight:500}}>{t.appName}</span>
          </div>
          <nav style={{display:'flex',gap:2,overflowX:'auto',flex:1}}>
            {nav.map(item=>(
              <button key={item.id} onClick={()=>setPage(item.id)} style={{display:'flex',alignItems:'center',gap:5,padding:'7px 10px',borderRadius:8,border:'none',background:page===item.id?C.s2:'transparent',color:page===item.id?C.mint:C.td,fontSize:12.5,fontWeight:500,whiteSpace:'nowrap',cursor:'pointer'}}>
                <span style={{fontSize:13}}>{item.e}</span> {item.l}
              </button>
            ))}
          </nav>
          <button onClick={()=>setLang(l=>l==='es'?'en':'es')} style={{padding:'6px 12px',borderRadius:8,border:`1px solid ${C.line}`,background:'transparent',color:C.td,fontSize:13,fontWeight:500,flexShrink:0,cursor:'pointer'}}>
            {lang==='es'?'🇺🇸 EN':'🇪🇸 ES'}
          </button>
        </div>
      </header>
      <main>
        {page==='home'&&<Home t={t} goTo={setPage}/>}
        {page==='quiz'&&<Quiz goTo={setPage}/>}
        {page==='explorer'&&<Explorer goTo={setPage} onAnalyze={setPendingTicker}/>}
        {page==='glossary'&&<Glossary/>}
        {page==='checklist'&&<Checklist autoTicker={pendingTicker} clearAuto={()=>setPendingTicker('')}/>}
        {page==='risk'&&<RiskCenter/>}
        {page==='calc'&&<Calculator/>}
        {page==='portafolio'&&<Watchlist/>}
        {page==='simulador'&&<Simulator/>}
      </main>
      <footer style={{borderTop:`1px solid ${C.line}`,marginTop:80}}>
        <div style={{maxWidth:1100,margin:'0 auto',padding:'24px 20px',display:'flex',gap:12,alignItems:'flex-start'}}>
          <span style={{fontSize:16,flexShrink:0}}>🛡️</span>
          <p style={{fontSize:12.5,color:C.tf,lineHeight:1.6,margin:0}}>{t.disclaimer}</p>
        </div>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
