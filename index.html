const GLOSSARY=[
  /* Ordenado alfabéticamente — 42 términos */
  {term:'Altcoin',eg:'ETH, SOL, ADA, DOGE',ref:'Mayor riesgo que Bitcoin',def:'Cualquier criptomoneda que no sea Bitcoin. Van desde Ethereum (seria infraestructura) hasta memecoins especulativas. El riesgo varía enormemente entre proyectos.',cat:'cripto'},
  {term:'AUM (Assets Under Management)',eg:'SPY $550B, VOO $450B',ref:'>$1B sólido · >$100M aceptable · <$100M riesgo cierre',def:'Total de activos administrados por el ETF en millones de dólares. Un AUM grande garantiza que el fondo no cierre y tiene spreads muy ajustados. ETFs pequeños pueden liquidarse, forzando una venta.',cat:'etf'},
  {term:'Aversión a las Pérdidas',eg:'Perder $1000 duele ~2x más que ganar $1000',ref:'Nuestro cerebro sobrevalora las pérdidas respecto a las ganancias equivalentes',def:'Tendencia psicológica a sentir más dolor por una pérdida que placer por una ganancia equivalente. Lleva a vender en mínimos ("no puedo ver más pérdidas") y mantener posiciones perdedoras esperando recuperación.',cat:'conductual'},
  {term:'Beta',eg:'TSLA ~2.0, KO ~0.6, BTC ~1.8',ref:'Beta>1 = más volátil que el mercado',def:'Mide la sensibilidad de un activo frente al mercado. Beta de 2 significa que si el mercado sube 10%, el activo tiende a subir 20% (y viceversa). Una cartera con beta alto amplifica tanto las ganancias como las pérdidas.',cat:'riesgo'},
  {term:'Blockchain',eg:'Bitcoin, Ethereum, Solana',ref:'',def:'Registro distribuido e inmutable de transacciones. Cada bloque contiene datos y apunta al bloque anterior, formando una cadena. Es la tecnología base de todas las criptomonedas.',cat:'cripto'},
  {term:'Buy and Hold',eg:'Estrategia de Buffett, Bogle, la mayoría de fondos indexados',ref:'Históricamente supera al 90% de los traders activos',def:'Comprar activos de calidad y mantenerlos durante años o décadas, ignorando la volatilidad a corto plazo. Se basa en que los mercados suben a largo plazo y los costos de transacción son altos.',cat:'estrategia'},
  {term:'Correlación',eg:'BTC/acciones correlación baja',ref:'Busca activos con baja correlación entre sí',def:'Medida de cómo se mueven dos activos juntos. Correlación de +1 = siempre juntos. De 0 = independientes. De -1 = opuestos. La diversificación real requiere activos con correlación baja o negativa.',cat:'riesgo'},
  {term:'Crecimiento EPS',eg:'+25%/año NVDA, +8%/año KO',ref:'>15% alto · 5-15% moderado · <5% bajo',def:'Tasa de crecimiento de las ganancias por acción (EPS). El motor más directo del precio de la acción a largo plazo. Se mide anual, trimestral o proyectado 3-5 años.',cat:'calidad'},
  {term:'DeFi (Finanzas Descentralizadas)',eg:'Uniswap, Aave, Compound',ref:'Alta volatilidad y riesgo de smart contract',def:'Ecosistema de servicios financieros (préstamos, exchanges, ahorro) que operan en blockchain sin intermediarios. Muy innovador pero también muy arriesgado por bugs en contratos inteligentes.',cat:'cripto'},
  {term:'Deuda/Capital (D/E)',eg:'AAPL ~1.8x, JNJ ~0.5x',ref:'<0.5 bajo · 0.5-1.5 moderado · >2 alto',def:'Deuda total dividida entre capital propio. Un D/E alto implica más riesgo financiero si los ingresos caen o las tasas de interés suben. Sectores como utilities o bancos suelen operar con más deuda.',cat:'calidad'},
  {term:'Diversificación',eg:'60% acciones, 30% bonos, 10% alternativas',ref:'Nunca más del 10-15% en un solo activo',def:'Repartir el capital entre activos no correlacionados para que el mal desempeño de uno no arruine la cartera. No es solo tener muchos activos — acciones tech correlacionan fuertemente entre sí.',cat:'riesgo'},
  {term:'Dividend Yield',eg:'KO ~3.1%, SCHD ~3.5%',ref:'>3% atractivo para ingresos',def:'Dividendo anual dividido entre el precio de la acción. Mide el ingreso que genera el activo. Un yield muy alto puede indicar precio deprimido o riesgo de recorte del dividendo.',cat:'valoracion'},
  {term:'Dollar-Cost Averaging (DCA)',eg:'$500/mes en VOO independientemente del precio',ref:'Ideal para inversores sin tiempo para analizar timing',def:'Invertir una cantidad fija a intervalos regulares (mensual, quincenal). Compras más participaciones cuando el precio baja, menos cuando sube. Elimina el riesgo de invertir todo en el peor momento.',cat:'estrategia'},
  {term:'Drawdown Máximo',eg:'S&P500: -57% en 2008, -34% en 2020',ref:'Pregúntate si puedes tolerar ese nivel de pérdida',def:'Caída máxima desde un pico histórico hasta el punto más bajo antes de recuperarse. Es la prueba de fuego de tu tolerancia al riesgo. Si el drawdown te haría vender en pánico, la posición es demasiado grande.',cat:'riesgo'},
  {term:'Efecto Anclaje',eg:'Compré a $200, ahora está a $120, espero volver a $200 para vender',ref:'El precio de compra no tiene relevancia para el precio futuro',def:'Fijar decisiones en torno a un precio de referencia arbitrario (generalmente el precio de compra). El mercado no sabe ni le importa lo que pagaste. Las decisiones deben basarse en el valor actual, no en el pasado.',cat:'conductual'},
  {term:'EV/EBITDA',eg:'Tech ~20x, industria ~10x',ref:'<8 barato · 8-15 normal · >20 caro',def:'Valor empresa (deuda + capitalización) entre ganancias antes de impuestos, depreciación y amortización. Permite comparar empresas con distintos niveles de deuda o regímenes fiscales.',cat:'valoracion'},
  {term:'FOMO (Fear of Missing Out)',eg:'Cripto en 2021, dotcom en 1999',ref:'Si todos están comprando eufóricos, suele ser tarde',def:'Miedo a perderse una subida. Lleva a comprar en picos eufóricos del mercado, exactamente cuando el riesgo es mayor. Las peores compras de la historia se hacen con FOMO.',cat:'conductual'},
  {term:'Free Cash Flow (FCF)',eg:'AAPL ~$100B/año',ref:'Positivo y creciente es ideal',def:'Caja disponible después de invertir en el negocio. Es el dinero real que genera la empresa — para dividendos, recompras o crecer. Una empresa con FCF fuerte puede sobrevivir crisis.',cat:'calidad'},
  {term:'Gestora de Fondos',eg:'Vanguard, BlackRock (iShares), State Street (SPDR)',ref:'Vanguard, BlackRock y SPDR son tier 1',def:'La empresa que administra el ETF. Las gestoras tier 1 tienen décadas de historia, regulación estricta y bajo riesgo operacional. Menor tamaño = mayor riesgo de cambios o cierre del fondo.',cat:'etf'},
  {term:'Halving (Bitcoin)',eg:'Cada ~4 años, próximo 2028',ref:'Históricamente precede a ciclos alcistas',def:'Evento programado donde la recompensa de minar Bitcoin se reduce a la mitad. Reduce la oferta nueva de BTC. Ha coincidido históricamente con grandes movimientos de precio.',cat:'cripto'},
  {term:'Índice Subyacente',eg:'S&P 500, NASDAQ-100, MSCI World',ref:'',def:'El benchmark que el ETF intenta replicar. Cada índice tiene sus propias reglas de selección, ponderación y rebalanceo. Conocer el índice es tan importante como conocer el ETF.',cat:'etf'},
  {term:'Margen Neto',eg:'NVDA ~55%, WMT ~2.5%',ref:'>20% excelente · 5-20% normal · <5% bajo',def:'Ganancia neta como porcentaje de ventas. Cuántos centavos de cada dólar vendido se convierten en ganancia. Varía enormemente por sector: tecnología vs. supermercados.',cat:'calidad'},
  {term:'Market Cap (Cripto)',eg:'BTC ~$1.3T, ETH ~$400B',ref:'Mega >$200B · Grande $10-200B · Mid <$10B',def:'Precio multiplicado por el total de monedas en circulación. Indica el tamaño y madurez de un criptoactivo. Bitcoin y Ethereum son los de mayor capitalización y liquidez del mercado.',cat:'cripto'},
  {term:'P/CF (Price/Cash Flow)',eg:'SP500 promedio ~14x',ref:'<10 atractivo · 10-20 normal · >20 caro',def:'Precio entre flujo de caja operativo. Más difícil de manipular contablemente que las ganancias netas. Preferido por analistas de value investing para medir calidad real del negocio.',cat:'valoracion'},
  {term:'PB (Price/Book)',eg:'Bancos ~1x, tech ~8x',ref:'<1 posible ganga · 1-3 normal · >5 premium',def:'Precio entre valor contable neto (activos menos deudas). PB de 1 significa que pagas exactamente lo que valen los activos en libros. Muy usado en banca e industria.',cat:'valoracion'},
  {term:'PE (Price/Earnings)',eg:'AAPL ~28x, S&P500 ~22x',ref:'<15 barato · 15-25 normal · >30 caro',def:'Cuánto pagas por cada $1 de ganancia anual. PE de 20 significa que pagas $20 por cada $1 de beneficio. Valores más altos implican mayores expectativas de crecimiento futuro.',cat:'valoracion'},
  {term:'PEG Ratio',eg:'PEG de 1.0 = precio justo',ref:'<1 subvalorado · 1-2 normal · >2 caro',def:'PE dividido por la tasa de crecimiento de ganancias. Ajusta el PE por el crecimiento esperado. Un PEG bajo indica que el precio puede ser razonable dada la velocidad de crecimiento de la empresa.',cat:'valoracion'},
  {term:'Position Sizing',eg:'Máximo 5-10% del portafolio por activo',ref:'Regla del 2%: en trading activo, nunca arriesgar más del 2% por operación',def:'Qué porcentaje del capital total asignas a cada posición. Acota el daño máximo si una apuesta sale mal. Una posición del 50% que pierde 40% destruye el 20% de tu cartera total.',cat:'estrategia'},
  {term:'PS (Price/Sales)',eg:'NVDA ~25x, KO ~5x',ref:'<2 bajo · 2-6 normal · >10 growth',def:'Precio entre ventas totales. Útil para empresas en crecimiento que aún no son rentables (sin ganancias). No compares PS entre sectores diferentes — tecnología tiene PS mucho mayor que retail.',cat:'valoracion'},
  {term:'Rebalanceo',eg:'Anual o cuando un activo supera ±5% del objetivo',ref:'1-2 veces al año es suficiente para la mayoría',def:'Ajustar periódicamente la cartera para restaurar los porcentajes objetivo. Implica vender lo que subió y comprar lo que bajó. Disciplina que fuerza a comprar barato y vender caro sistemáticamente.',cat:'estrategia'},
  {term:'Réplica Física',eg:'VOO, SPY, QQQ',ref:'Más segura y transparente',def:'El ETF compra directamente las acciones del índice. Es el método más transparente. Variante "Muestreo" compra una muestra representativa cuando el índice tiene demasiados componentes.',cat:'etf'},
  {term:'Réplica Sintética',eg:'Algunos ETFs europeos',ref:'Mayor riesgo de contraparte',def:'El ETF no compra las acciones, sino contratos con un banco para recibir el rendimiento del índice. Puede ser eficiente en mercados difíciles de acceder, pero añade riesgo si el banco falla.',cat:'etf'},
  {term:'ROE (Return on Equity)',eg:'AAPL ~150%, MSFT ~40%',ref:'<10% bajo · 10-20% normal · >20% excelente',def:'Cuánto beneficio genera la empresa por cada dólar de capital de los accionistas. ROE alto indica empresa muy eficiente generando ganancias. Compara dentro del mismo sector.',cat:'calidad'},
  {term:'Sesgo de Confirmación',eg:'Solo leer noticias positivas sobre acciones que ya tienes',ref:'Busca activamente argumentos en contra de tus posiciones',def:'Tendencia a buscar y recordar información que confirma lo que ya creemos. Si tienes Tesla, buscas noticias positivas de Tesla. Lleva a no ver señales de alerta que otros sí ven.',cat:'conductual'},
  {term:'Sesgo de Recencia',eg:'2022: muchos vendieron en el fondo. 2020 igual.',ref:'Recuerda: el mercado ya ha sobrevivido cada crisis pasada',def:'Tendencia a sobrevalorar lo que acaba de ocurrir como predictor del futuro. Si el mercado lleva 3 meses bajando, sentimos que bajará siempre. Es una de las causas más comunes de pérdidas por timing.',cat:'conductual'},
  {term:'Sharpe Ratio',eg:'>1.0 bueno · >2.0 excelente',ref:'Compara siempre en el mismo período',def:'Retorno extra sobre la tasa libre de riesgo, dividido entre la volatilidad. Mide cuánto rendimiento obtienes por cada unidad de riesgo. Un Sharpe de 1.0 significa que ganas 1% de exceso por cada 1% de volatilidad.',cat:'riesgo'},
  {term:'Stablecoin',eg:'USDT, USDC, DAI',ref:'No es inversión, es efectivo digital',def:'Criptomoneda diseñada para mantener paridad con el dólar u otra moneda. Usada para mover dinero en el ecosistema cripto sin exposición a la volatilidad. Tiene riesgos propios de respaldo.',cat:'cripto'},
  {term:'Stock (Acción)',eg:'AAPL, MSFT, NVDA — acciones de Apple, Microsoft y Nvidia',ref:'Se negocian en bolsas: NYSE, NASDAQ',def:'Título de propiedad que representa una fracción del capital de una empresa. Al comprar un stock te conviertes en accionista y participas en las ganancias (dividendos) y en el valor de la empresa. Su precio refleja las expectativas del mercado sobre el futuro del negocio.',cat:'estrategia'},
  {term:'Stop-Loss',eg:'Stop del -15% sobre posición individual',ref:'No usar en activos muy volátiles — riesgo de ejecución en mínimos',def:'Orden que vende automáticamente si el precio cae a un nivel predefinido. Limita pérdidas máximas pero puede ejecutarse justo en el mínimo temporal. Útil en posiciones especulativas de alta convicción.',cat:'estrategia'},
  {term:'TER (Total Expense Ratio)',eg:'VOO 0.03%, ARKK 0.75%',ref:'<0.10% excelente · 0.10-0.5% normal · >0.75% alto',def:'Costo anual de un ETF como porcentaje de tu inversión. Se descuenta automáticamente del rendimiento. En 30 años, un TER de 0.03% vs 1% puede significar decenas de miles de dólares de diferencia.',cat:'etf'},
  {term:'Tracking Difference',eg:'VOO ~0.01%, TLT ~0.05%',ref:'<0.10% excelente · <0.30% aceptable',def:'Diferencia entre el rendimiento del ETF y el índice que replica, en un año. Más preciso que el TER para medir el costo real. Un ETF puede tener TER bajo pero tracking difference alto.',cat:'etf'},
  {term:'Volatilidad',eg:'S&P500 ~15% anual, BTC ~70% anual',ref:'Mayor volatilidad = mayor incertidumbre',def:'Medida de cuánto fluctúa el precio. Se expresa como desviación estándar anualizada. Una volatilidad de 20% significa que en años normales, el precio puede moverse +/- 20% respecto a la media.',cat:'riesgo'},
];

const detectGestora=function(name){
  var n=(name||'').toLowerCase();
  if(n.indexOf('vanguard')>=0)return{gestora:'Vanguard',gestoraTier:'top'};
  if(n.indexOf('ishares')>=0||n.indexOf('blackrock')>=0)return{gestora:'BlackRock (iShares)',gestoraTier:'top'};

  if(n.indexOf('invesco')>=0)return{gestora:'Invesco',gestoraTier:'top'};
  if(n.indexOf('schwab')>=0)return{gestora:'Schwab',gestoraTier:'top'};
  if(n.indexOf('fidelity')>=0)return{gestora:'Fidelity',gestoraTier:'mid'};
  if(n.indexOf('wisdomtree')>=0||n.indexOf('wisdom tree')>=0)return{gestora:'WisdomTree',gestoraTier:'mid'};
  if(n.indexOf('vaneck')>=0||n.indexOf('van eck')>=0)return{gestora:'VanEck',gestoraTier:'mid'};
  if(n.indexOf('first trust')>=0)return{gestora:'First Trust',gestoraTier:'mid'};
  if(n.indexOf('global x')>=0||n.indexOf('globalx')>=0)return{gestora:'Global X',gestoraTier:'mid'};
  if(n.indexOf('direxion')>=0||n.indexOf('proshares')>=0||n.indexOf('2x')>=0||n.indexOf('3x')>=0)return{gestora:name.split(' ').slice(0,2).join(' '),gestoraTier:'low'};
  return{gestora:name?(name.split(' ').slice(0,2).join(' ')||'N/D'):'N/D',gestoraTier:null};
};

  if(d.change&&Math.abs(d.change)>2){var cc=d.change>5?C.mint:d.change>0?C.td:d.change<-5?'#f87171':'#f59e0b';rRows.push(mrow('day','Movimiento Hoy',(d.change>0?'+':'')+d.change.toFixed(2)+'%',cc,(Math.abs(d.change)>5?'Movimiento fuerte — verifica si hay noticias corporativas o macroeconómicas.':'Fluctuación dentro del rango normal para este tipo de activo.')));}
  if(rRows.length===0)rRows.push(mrow('nd','Datos de riesgo','N/D',C.tf,'Información de riesgo no disponible para este activo.'));

  // ══ TARJETA 4: ANALISTAS ══
  var aRows=[];
  var aColor=C.td;
  if(d.buyC+d.holdC+d.sellC>0){
    aColor=d.consensus==='Compra'?C.mint:d.consensus==='Venta'?'#f87171':'#f59e0b';
    aRows.push(mrow('con','Consenso de Analistas',d.consensus,aColor,''+d.buyC+' compra · '+d.holdC+' mantener · '+d.sellC+' vender. Total: '+(d.buyC+d.holdC+d.sellC)+' analistas.'));
  }
  if(d.target&&d.upside!==null){
    var uc=d.upside>15?C.mint:d.upside>0?C.td:'#f87171';
    aRows.push(mrow('tgt','Precio Objetivo (Promedio Analistas)','$'+d.target.toFixed(2),uc,'Potencial '+(d.upside>0?'subida de +'+d.upside.toFixed(1)+'%':'bajada de '+d.upside.toFixed(1)+'%')+' desde precio actual ($'+d.price.toFixed(2)+').'));
    if(d.targetHigh&&d.targetLow)aRows.push(mrow('rng','Rango Objetivos Analistas','$'+d.targetLow.toFixed(2)+' – $'+d.targetHigh.toFixed(2),C.td,'Diferencia entre el analista más pesimista y el más optimista: $'+(d.targetHigh-d.targetLow).toFixed(2)+'. Un rango amplio indica alta incertidumbre.'));
  }
  if(aRows.length===0)aRows.push(mrow('nd','Datos de analistas','N/D',C.tf,'Sin datos en la API gratuita. Consulta Yahoo Finance o Bloomberg para complementar.'));

  // ══ VEREDICTO: SCORE ══
  var sc=50;
  if(d.pe){if(d.pe<20)sc+=12;else if(d.pe<35)sc+=5;else if(d.pe>60)sc-=12;}
  if(d.roe){if(d.roe>20)sc+=10;else if(d.roe>10)sc+=5;else if(d.roe<0)sc-=8;}
  if(d.netMargin){if(d.netMargin>15)sc+=10;else if(d.netMargin>5)sc+=5;else if(d.netMargin<0)sc-=10;}
  if(d.revenueGrowth){if(d.revenueGrowth>15)sc+=8;else if(d.revenueGrowth>5)sc+=3;else if(d.revenueGrowth<0)sc-=8;}
  if(d.de!==null){if(d.de<0.5)sc+=8;else if(d.de<1.5)sc+=3;else if(d.de>3)sc-=10;}
  if(d.consensus==='Compra')sc+=12;else if(d.consensus==='Venta')sc-=10;
  if(d.upside!==null){if(d.upside>20)sc+=10;else if(d.upside>5)sc+=4;else if(d.upside<-10)sc-=10;}
  if(d.currentRatio){if(d.currentRatio>1.5)sc+=5;else if(d.currentRatio<1)sc-=5;}
  if(d.graham&&d.price){if(d.price<d.graham*0.8)sc+=10;else if(d.price>d.graham*1.3)sc-=8;}
  if(d.peg&&d.peg>0){if(d.peg<1)sc+=8;else if(d.peg>3)sc-=8;}
  sc=Math.max(5,Math.min(95,sc));
  var vLabel,vColor,vBg;
  if(sc>=72){vLabel='Señales Fundamentales Favorables';vColor=C.mint;vBg='rgba(61,220,151,0.07)';}
  else if(sc>=55){vLabel='Señales Moderadamente Positivas';vColor='#86efac';vBg='rgba(134,239,172,0.05)';}
  else if(sc>=40){vLabel='Señales Mixtas — Evalúa con Cautela';vColor='#f59e0b';vBg='rgba(245,158,11,0.07)';}
  else{vLabel='Señales de Precaución';vColor='#f87171';vBg='rgba(248,113,113,0.07)';}

  var pros=[];var cons=[];
  if(d.pe&&d.pe<20)pros.push('Valoración PE atractiva ('+d.pe.toFixed(1)+'x)');
  if(d.pe&&d.pe>55)cons.push('PE muy elevado ('+d.pe.toFixed(1)+'x) — exige crecimiento excepcional');
  if(d.roe&&d.roe>20)pros.push('ROE excelente — negocio muy eficiente ('+d.roe.toFixed(0)+'%)');
  if(d.roe&&d.roe<0)cons.push('ROE negativo — empresa no rentable actualmente');
  if(d.netMargin&&d.netMargin>15)pros.push('Margen neto fuerte ('+d.netMargin.toFixed(1)+'%)');
  if(d.netMargin&&d.netMargin<0)cons.push('Sin rentabilidad neta todavía');
  if(d.revenueGrowth&&d.revenueGrowth>15)pros.push('Crecimiento de ingresos acelerado (+'+d.revenueGrowth.toFixed(0)+'%)');
  if(d.revenueGrowth&&d.revenueGrowth<0)cons.push('Ingresos en contracción');
  if(d.de!==null&&d.de<0.5)pros.push('Balance sólido — deuda muy baja');
  if(d.de!==null&&d.de>2.5)cons.push('Apalancamiento elevado (D/E '+d.de.toFixed(1)+'x)');
  if(d.consensus==='Compra'&&d.buyC>=5)pros.push('Fuerte consenso de compra ('+d.buyC+' analistas)');
  if(d.consensus==='Venta')cons.push('Consenso de venta entre analistas');
  if(d.upside&&d.upside>20)pros.push('Potencial de +'+d.upside.toFixed(0)+'% según precio objetivo');
  if(d.upside&&d.upside<-10)cons.push('Precio supera objetivo promedio de analistas');
  if(d.graham&&d.price<d.graham*0.8)pros.push('Descuento al valor de Graham — margen de seguridad amplio');
  if(d.graham&&d.price>d.graham*1.4)cons.push('Prima alta sobre valor intrínseco de Graham');
  if(d.dividendYield&&d.dividendYield>3)pros.push('Dividendo generoso ('+d.dividendYield.toFixed(1)+'% anual)');
  if(d.currentRatio&&d.currentRatio<1)cons.push('Liquidez ajustada (ratio corriente '+d.currentRatio.toFixed(2)+')');
  if(d.peg&&d.peg<1)pros.push('PEG < 1 — precio bajo relativo al crecimiento esperado');

  var prosEl=pros.slice(0,5).map(function(p,i){return React.createElement('div',{key:i,style:{display:'flex',gap:7,alignItems:'flex-start',marginBottom:5}},React.createElement('span',{style:{color:C.mint,fontSize:12,flexShrink:0,marginTop:1}},'✓'),React.createElement('span',{style:{fontSize:12,color:C.td,lineHeight:1.4}},p));});
  var consEl=cons.slice(0,5).map(function(p,i){return React.createElement('div',{key:i,style:{display:'flex',gap:7,alignItems:'flex-start',marginBottom:5}},React.createElement('span',{style:{color:'#f87171',fontSize:12,flexShrink:0,marginTop:1}},'✗'),React.createElement('span',{style:{fontSize:12,color:C.td,lineHeight:1.4}},p));});

  var vCard=React.createElement('div',{style:{padding:'16px 18px',borderRadius:12,background:vBg,border:'1px solid '+vColor+'55'}},
    React.createElement('div',{style:{display:'flex',alignItems:'center',gap:8,marginBottom:14,paddingBottom:10,borderBottom:'1px solid '+vColor+'33'}},
      React.createElement('span',{style:{fontSize:15}},'🧭'),
      React.createElement('span',{style:{fontSize:13.5,fontWeight:700,color:vColor}},'Veredicto Final')
    ),
    React.createElement('div',{style:{display:'flex',alignItems:'center',gap:14,marginBottom:14,padding:'14px',borderRadius:10,background:'rgba(0,0,0,0.15)'}},
      React.createElement('div',{style:{width:54,height:54,borderRadius:'50%',border:'3px solid '+vColor,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}},
        React.createElement('span',{style:{fontSize:18,fontWeight:800,color:vColor,fontFamily:'monospace'}},sc)
      ),
      React.createElement('div',null,
        React.createElement('p',{style:{margin:'0 0 3px',fontSize:14,fontWeight:700,color:vColor}},vLabel),
        React.createElement('p',{style:{margin:0,fontSize:11,color:C.tf}},'Puntuación /100 basada en valoración, calidad, riesgo y consenso analistas.')
      )
    ),
    pros.length>0||cons.length>0?React.createElement('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}},
      React.createElement('div',null,
        pros.length>0?React.createElement('p',{style:{margin:'0 0 8px',fontSize:10.5,color:C.tf,textTransform:'uppercase',letterSpacing:'0.07em'}},'A favor'):null,
        React.createElement('div',null,prosEl)
      ),
      React.createElement('div',null,
        cons.length>0?React.createElement('p',{style:{margin:'0 0 8px',fontSize:10.5,color:C.tf,textTransform:'uppercase',letterSpacing:'0.07em'}},'A vigilar'):null,
        React.createElement('div',null,consEl)
      )
    ):null,
    React.createElement('p',{style:{margin:'12px 0 0',fontSize:11,color:C.tf,lineHeight:1.5}},'⚠ Información educativa, no asesoramiento financiero. La decisión final siempre es tuya.')
  );

  var valColor=d.pe&&d.pe<20?C.mint:d.pe&&d.pe>55?'#f87171':d.pb&&d.pb<1?C.mint:'#f59e0b';
  var qualColor=d.roe>20?C.mint:d.netMargin>15?C.mint:d.roe>10||d.netMargin>8?C.td:'#f59e0b';
  var riskColor=d.de!==null&&d.de>2.5?'#f87171':d.beta&&d.beta>1.8?'#f59e0b':d.de!==null&&d.de<0.5?C.mint:'#f59e0b';

  return React.createElement('div',{style:{display:'flex',flexDirection:'column',gap:10}},
    card('📊','Valoración',valColor,vRows),
    qRows.length>0?card('💼','Calidad del Negocio',qualColor,qRows):null,
    card('⚠️','Riesgo',riskColor,rRows),
    card('🎯','Señal de Analistas',aColor,aRows),
    vCard
  );
}

// ─── MODULE 4: CHECKLIST ─────────────────────────────────────────────────────
function Checklist(props){
  var autoTicker=props.autoTicker||'';
  var clearAuto=props.clearAuto||function(){};
  var stT=useState('');var ticker=stT[0];var setTicker=stT[1];
  var stD=useState(null);var ckData=stD[0];var setCkData=stD[1];
  var stL=useState(false);var loading=stL[0];var setLoading=stL[1];
  var stE=useState('');var ckErr=stE[0];var setCkErr=stE[1];
  var stS=useState('');var sym=stS[0];var setSym=stS[1];

  // Auto-cargar ticker enviado desde el Explorador
  useEffect(function(){
    if(autoTicker&&autoTicker.trim().length>0){
      setTicker(autoTicker.trim());
      doFetch(autoTicker.trim());
      clearAuto();
    }
  },[autoTicker]);

  function doFetch(t){
    var DK='d8ul8apr01qrt65sjsvgd8ul8apr01qrt65sjt00';
    var OLD='d8rik39r01qnkitnbb8g';
    var stored=localStorage.getItem('mc_finnhub_key');
    if(!stored||stored===OLD){localStorage.setItem('mc_finnhub_key',DK);stored=DK;}
    var key=stored;
    setLoading(true);setCkData(null);setCkErr('');setSym(t);
    var base='https://finnhub.io/api/v1';
    function safe(p){return p.catch(function(){return null;});}
    Promise.all([
      safe(fetch(base+'/quote?symbol='+t+'&token='+key).then(function(r){return r.json();})),
      safe(fetch(base+'/stock/metric?symbol='+t+'&metric=all&token='+key).then(function(r){return r.json();})),
      safe(fetch(base+'/stock/profile2?symbol='+t+'&token='+key).then(function(r){return r.json();})),
      safe(fetch(base+'/stock/price-target?symbol='+t+'&token='+key).then(function(r){return r.json();})),
      safe(fetch(base+'/stock/recommendation?symbol='+t+'&token='+key).then(function(r){return r.json();}))
    ]).then(function(rs){
      var q=rs[0]||{};var m=((rs[1]||{}).metric)||{};var p=rs[2]||{};var pt=rs[3]||{};var rec=rs[4];
      if(q.error){setCkErr('❌ Clave Finnhub inválida o límite alcanzado. Ve al Explorador → "Cambiar clave".');setLoading(false);return;}
      if(q.c===undefined||q.c===null){setCkErr('No se pudo obtener datos. Verifica tu conexión o la clave Finnhub.');setLoading(false);return;}
      if(q.c===0&&(!q.pc||q.pc===0)){setCkErr('No se encontraron datos para "'+t+'". Finnhub soporta acciones y ETFs de EE.UU. con ticker en inglés (ej: AAPL, VOO, NVDA). Acciones de otras bolsas requieren formato EXCHANGE:TICKER.');setLoading(false);return;}
      var recArr=Array.isArray(rec)?rec:[];var lat=recArr[0]||{};
      var upside=pt.targetMean&&q.c?((pt.targetMean-q.c)/q.c*100):null;
      var totalBuy=(lat.buy||0)+(lat.strongBuy||0);
      var totalSell=(lat.sell||0)+(lat.strongSell||0);
      var totalHold=lat.hold||0;
      var consensus='Neutral';
      if(totalBuy||totalSell||totalHold){
        var mx=Math.max(totalBuy,totalHold,totalSell);
        if(mx===totalBuy&&totalBuy>0)consensus='Compra';
        else if(mx===totalSell&&totalSell>0)consensus='Venta';
      }
      var pe=m.peNormalizedAnnual||m.peTTM||m.peBasicExclExtraItemsTTM||null;
      var pb=m['pb']||m['pbAnnual']||m['pbQuarterly']||null;
      var ps=m['psTTM']||m['psAnnual']||null;
      var roe=m.roeTTM||m.roeRfy||m.roeAnnual||null;
      var de=m['totalDebt/totalEquityQuarterly']||m['totalDebt/totalEquityAnnual']||null;
      var eps=m.epsNormalizedAnnual||m.epsTTM||null;
      var grossMargin=m.grossMarginTTM||m.grossMarginAnnual||null;
      var netMargin=m.netProfitMarginTTM||m.netProfitMarginAnnual||null;
      var revenueGrowth=m.revenueGrowthTTMYoy||m.revenueGrowth3Y||null;
      var epsGrowth=m.epsGrowth3Y||m.epsGrowth5Y||null;
      var currentRatio=m.currentRatioQuarterly||m.currentRatioAnnual||null;
      var dividendYield=m.dividendYieldIndicatedAnnual||null;
      var beta=m.beta||null;
      var bookValueShare=m.bookValueShareAnnual||null;
      var peg=(pe&&epsGrowth&&epsGrowth>0)?pe/epsGrowth:null;
      var graham=(eps&&eps>0&&bookValueShare&&bookValueShare>0)?Math.sqrt(22.5*eps*bookValueShare):null;
      setCkData({name:p.name||t,sector:p.finnhubIndustry||'',exchange:p.exchange||'',
        price:q.c,change:q.dp||0,prevClose:q.pc||null,
        pe:pe,pb:pb,ps:ps,peg:peg,roe:roe,de:de,eps:eps,
        grossMargin:grossMargin,netMargin:netMargin,revenueGrowth:revenueGrowth,
        epsGrowth:epsGrowth,currentRatio:currentRatio,dividendYield:dividendYield,
        beta:beta,bookValueShare:bookValueShare,graham:graham,
        high52:m['52WeekHigh']||null,low52:m['52WeekLow']||null,
        target:pt.targetMean||null,targetHigh:pt.targetHigh||null,targetLow:pt.targetLow||null,
        upside:upside,consensus:consensus,buyC:totalBuy,holdC:totalHold,sellC:totalSell
      });
      setLoading(false);
    }).catch(function(){setCkErr('Error de conexión.');setLoading(false);});
  }

  return React.createElement('div',{style:{maxWidth:720,margin:'0 auto',padding:'48px 20px'}},
    React.createElement(ModHeader,{eyebrow:'Módulo 04',title:'Análisis de activo',body:'Escribe el ticker y presiona Enter. El sistema genera automáticamente 4 señales de información basadas en datos reales.'}),
    React.createElement('div',{style:{marginBottom:18,padding:'18px 20px',borderRadius:14,background:C.s,border:'1px solid '+(ckData?C.mintD:C.line)}},
      React.createElement('p',{style:{fontSize:12,color:C.tf,margin:'0 0 10px'}},'Ticker del activo a analizar'),
      React.createElement('div',{style:{display:'flex',gap:10,alignItems:'center',flexWrap:'wrap'}},
        React.createElement('input',{type:'text',value:ticker,placeholder:'NVDA, PLTR, VOO...',
          onChange:function(e){setTicker(e.target.value.toUpperCase());},
          onKeyDown:function(e){if(e.key==='Enter'&&ticker.trim().length>0)doFetch(ticker.trim());},
          style:{padding:'10px 16px',borderRadius:8,border:'1px solid '+(ckData?C.mintD:C.line),background:C.bg,color:C.mint,fontFamily:'monospace',fontSize:16,fontWeight:700,outline:'none',width:160}
        }),
        React.createElement('button',{
          onClick:function(){if(ticker.trim().length>0)doFetch(ticker.trim());},
          style:{padding:'10px 18px',borderRadius:8,background:C.mint,color:'#0d1117',fontWeight:700,fontSize:13,border:'none',cursor:'pointer'}
        },loading?'Buscando...':'Analizar →')
      ),
      ckErr?React.createElement('p',{style:{fontSize:12,color:'#f87171',margin:'8px 0 0',lineHeight:1.5}},ckErr):null,
      !ckErr&&!ckData?React.createElement('p',{style:{fontSize:11,color:C.tf,margin:'8px 0 0'}},'Acciones y ETFs de EE.UU. (AAPL, VOO, BRK.B). Otras bolsas: EXCHANGE:TICKER — ej. TSX:SHOP, LSE:HSBA.'):null
    ),
    ckData?React.createElement(CKDataCard,{d:ckData,sym:sym}):null,
    ckData?React.createElement(CKSignals,{d:ckData,sym:sym}):null
  );
}

</script>

        ))}

}

function Explorer({goTo,onAnalyze}){

  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState(null);
  const [res,setRes]=useState(null);
  const [dbg,setDbg]=useState('');
  const [avKey,setAvKey]=useState(()=>{var dk='d8ul8apr01qrt65sjsvgd8ul8apr01qrt65sjt00';var old='d8rik39r01qnkitnbb8g';var k=localStorage.getItem('mc_finnhub_key');if(!k||k===old){localStorage.setItem('mc_finnhub_key',dk);k=dk;}return k;});
  const [keyDraft,setKeyDraft]=useState('');
  const [inWl,setInWl]=useState(false);
  const cache=useRef({});

  // Sincronizar estado watchlist al cambiar resultado
  useEffect(()=>{
    if(!res){setInWl(false);return;}
    try{var wl=JSON.parse(localStorage.getItem('mc_watchlist')||'[]');setInWl(wl.some(function(x){return x.ticker===res.ticker;}));}
    catch(e){setInWl(false);}
  },[res]);

  const toggleWl=()=>{
    if(!res)return;
    try{
      var wl=JSON.parse(localStorage.getItem('mc_watchlist')||'[]');
      if(inWl){
        wl=wl.filter(function(x){return x.ticker!==res.ticker;});
        localStorage.setItem('mc_watchlist',JSON.stringify(wl));
        setInWl(false);
      } else {
        wl.push({ticker:res.ticker,name:res.name,sector:res.sector||'',isCrypto:!!res.isCrypto,isETF:!!res.isETF,fhSym:res.fhSym||('BINANCE:'+res.ticker+'USDT'),addedAt:new Date().toISOString()});
        localStorage.setItem('mc_watchlist',JSON.stringify(wl));
        setInWl(true);
        // → Ir al Módulo 4 con este ticker para análisis inmediato
        if(onAnalyze)onAnalyze(res.ticker);
        if(goTo)goTo('checklist');
      }
    }catch(e){}
  };

  // ── CRIPTOMONEDAS ── top 25 con símbolo Finnhub, métricas de riesgo y descripción
  const search=(ticker)=>{
    var k=(ticker||'').toUpperCase().trim();
    if(!k){setErr('Escribe un ticker como VOO, AAPL, MSFT, ARKK, XLK...');return;}
    if(!avKey){setErr('Ingresa tu clave de Finnhub primero (panel de arriba).');return;}
    if(cache.current[k]){setRes(cache.current[k]);setErr(null);setDbg('');return;}
    setLoading(true);setErr(null);setRes(null);setDbg('Obteniendo datos...');

    var FH='https://finnhub.io/api/v1';
    var KEY=avKey;

    // ── RUTA CRIPTO ──
    if(CRYPTO_REF[k]){
      var cr=CRYPTO_REF[k];
      var now=Math.floor(Date.now()/1000);
      var from2=now-3*86400; // últimas 72h para asegurar datos
      var candleUrl=FH+'/crypto/candle?symbol='+cr.fhSym+'&resolution=D&from='+from2+'&to='+now+'&token='+KEY;
      window.fetch(candleUrl).then(function(r){return r.json();}).then(function(cd){
        var price2=null,prevPrice=null,vol24=null,hi=null,lo=null;
        if(cd&&cd.s==='ok'&&cd.c&&cd.c.length>0){
          var last=cd.c.length-1;
          price2=cd.c[last];
          prevPrice=last>0?cd.c[last-1]:cd.o[last];
          hi=cd.h[last];lo=cd.l[last];
          vol24=cd.v?cd.v[last]:null;
        }
        var chgNum2=(price2&&prevPrice&&prevPrice>0)?((price2-prevPrice)/prevPrice*100):null;
        var fmtCPrice=function(p){if(!p)return'N/D';return p>=1?'$'+p.toFixed(2):'$'+p.toFixed(6);};
        var fmtVolC=function(v,p){if(!v||!p)return'N/D';var d=v*p;if(d>=1e9)return'$'+(d/1e9).toFixed(1)+'B/día';if(d>=1e6)return'$'+(d/1e6).toFixed(0)+'M/día';return'N/D';};
        // Grading cripto por riesgo
        var mcGrade=cr.mcapTier==='mega'?'green':cr.mcapTier==='large'?'yellow':'red';
        var ageYrs=new Date().getFullYear()-cr.launch;
        var ageGrade=ageYrs>=5?'green':ageYrs>=2?'yellow':'red';
        var useGrade=cr.useTier==='infra'?'green':cr.useTier==='utility'?'yellow':'red';
        var liqD=vol24&&price2?(vol24*price2):null;
        var liqGrade=liqD?(liqD>=1e9?'green':liqD>=1e8?'yellow':'red'):'none';
        var tiers={mega:'Muy Alta (Top 2)',large:'Alta (Top 10)',mid:'Media',small:'Pequeña'};
        var useLabels={infra:'Infraestructura/L1',utility:'Utilidad/DeFi',meme:'Meme / Especulativo'};
        var d={
          ticker:k,name:cr.name,sector:cr.sector,industry:'',exchange:'Crypto',
          price:fmtCPrice(price2),
          chg:chgNum2!=null?((chgNum2>=0?'+':'')+chgNum2.toFixed(2)+'%'):null,
          chgPos:(chgNum2||0)>=0,
          mktCap:'N/D',
          pe:'N/D',pb:'N/D',ps:'N/D',pcf:'N/D',peg:'N/D',roe:'N/D',debt:'N/D',
          desc:cr.desc,website:cr.website,
          isETF:false,isCrypto:true,
          // Métricas cripto
          cryptoMcapTier:cr.mcapTier,cryptoMcapGrade:mcGrade,cryptoMcapDisplay:tiers[cr.mcapTier]||cr.mcapTier,
          cryptoAge:ageYrs,cryptoAgeGrade:ageGrade,
          cryptoUse:useLabels[cr.useTier]||cr.useTier,cryptoUseGrade:useGrade,
          cryptoLiqDisplay:fmtVolC(vol24,price2),cryptoLiqGrade:liqGrade,
          cryptoHi:hi?fmtCPrice(hi):null,cryptoLo:lo?fmtCPrice(lo):null,
          // Proyección
          projUpside:null,projTarget:null,projConsensus:null,projTotal:0,
          etfHistReturn:null,etfHistNote:null,
          growthEst:null,growthSrc:'',
          volPct:cr.vol||null,
        };
        cache.current[k]=d;setRes(d);setDbg('');setLoading(false);
      }).catch(function(e){setErr('Error cripto: '+e.message);setLoading(false);});
      return;
    }

    var fmtN=function(v,dec){dec=dec||2;var n=Number(v);return(v!=null&&v!==''&&!isNaN(n)&&n!==0)?n.toFixed(dec):'N/D';};
    var fmtMC=function(v){
      var n=Number(v);
      if(!v||isNaN(n)||n===0)return'N/D';
      var raw=n*1e6; // Finnhub da marketCap en millones
      if(raw>1e12)return'$'+(raw/1e12).toFixed(2)+'T';
      if(raw>1e9)return'$'+(raw/1e9).toFixed(1)+'B';
      return'$'+(raw/1e6).toFixed(0)+'M';
    };
    var safe=function(url){return window.fetch(url).then(function(r){return r.json();}).catch(function(){return{};});};

    // Finnhub — 3 llamadas paralelas, sin límite diario (60/min)
    // Cubre: acciones EE.UU., ETFs, ADRs y muchos mercados internacionales
    Promise.all([
      safe(FH+'/quote?symbol='+k+'&token='+KEY),
      safe(FH+'/stock/metric?symbol='+k+'&metric=all&token='+KEY),
      safe(FH+'/stock/profile2?symbol='+k+'&token='+KEY),
      safe(FH+'/stock/price-target?symbol='+k+'&token='+KEY),
      safe(FH+'/stock/recommendation?symbol='+k+'&token='+KEY),
    ]).then(function(results){
      var qt=results[0]||{};
      var mt=(results[1]&&results[1].metric)||{};
      var pr=results[2]||{};
      var ptData=results[3]||{};
      var recArr=(results[4]&&Array.isArray(results[4]))?results[4]:[];
      var recData=recArr[0]||{};

      // Error de clave
      if(results[1]&&results[1].error){
        var ferr=results[1].error||'';
        if(/API|key|auth|token/i.test(ferr)){
          setErr('❌ Clave inválida. Pulsa "Cambiar clave" y pega la clave exacta de finnhub.io.');
        } else {
          setErr(ferr.slice(0,200));
        }
        setDbg('');setLoading(false);return;
      }

      // Ticker no encontrado
      if((!qt.c||qt.c===0)&&!pr.name){
        setErr('Ticker "'+k+'" no encontrado. Finnhub cubre acciones de EE.UU., ETFs, ADRs y mercados internacionales. Verifica el símbolo.');
        setDbg('');setLoading(false);return;
      }

      // Precio y cambio diario
      var price=qt.c;
      var prevClose=qt.pc;
      var chgNum=(price&&prevClose&&prevClose!==0)?((price-prevClose)/prevClose*100):null;

      // Detectar si es ETF
      var etfRef=ETF_REF[k]||null;
      var isETF=(pr.type==='ETC'||pr.type==='ETF'||!!etfRef);

      var fmtAUM=function(m){if(!m||isNaN(m)||m<=0)return'N/D';if(m>=1e6)return'$'+(m/1e6).toFixed(2)+'T';if(m>=1000)return'$'+(m/1000).toFixed(1)+'B';return'$'+m.toFixed(0)+'M';};
      var fmtLiq=function(m){if(!m||isNaN(m)||m<=0)return'N/D';return(m>=1000?'$'+(m/1000).toFixed(1)+'B':'$'+m.toFixed(0)+'M')+'/día';};

      // AUM: 1) ETF_REF hardcoded (más fiable)  2) profile2.marketCapitalization  3) sharesOutstanding × precio
      var aumMill=etfRef&&etfRef.aum?etfRef.aum:null;
      if(!aumMill&&pr.marketCapitalization){aumMill=Number(pr.marketCapitalization);}
      if((!aumMill||aumMill<=0)&&mt.sharesOutstanding&&price>0){aumMill=mt.sharesOutstanding*price;}
      var aumDisplay=fmtAUM(aumMill);

      // Liquidez: 1) ETF_REF liqRef  2) 10DayAverageTradingVolume × precio  3) N/D
      var liqMill=etfRef&&etfRef.liqRef?etfRef.liqRef:null;
      if(!liqMill){var vol10d=mt['10DayAverageTradingVolume'];if(vol10d&&vol10d>0&&price>0)liqMill=vol10d*price;}
      var liqDisplay=fmtLiq(liqMill);

      // Gestora — desde ETF_REF si disponible, si no detectar del nombre
      var gInfo=etfRef?{gestora:etfRef.gestora,gestoraTier:etfRef.gestoraTier}:detectGestora(pr.name||'');
      var etfGestora=gInfo.gestora||'N/D';
      var etfGestoraTier=gInfo.gestoraTier||null;

      // Réplica y Tracking Difference — desde ETF_REF si disponible
      var etfReplica=etfRef?etfRef.replica:'N/D';
      var etfTD=etfRef?etfRef.td:'N/D';

      // Métricas fundamentales (solo relevantes para acciones, N/D esperado para ETFs)
      // ROE — porcentaje directo en Finnhub (156.08 = 156.08%)
      var roeVal=mt.roeTTM!=null?mt.roeTTM:(mt.roeRfy!=null?mt.roeRfy:null);
      var roeDisplay=(!isETF&&roeVal!=null&&!isNaN(Number(roeVal)))?Number(roeVal).toFixed(1)+'%':'N/D';

      // D/E — Deuda/Capital
      var deVal=mt['totalDebt/totalEquityAnnual']!=null?mt['totalDebt/totalEquityAnnual']
              :(mt.debtToEquityAnnual!=null?mt.debtToEquityAnnual:null);
      var debtDisplay=(!isETF&&deVal!=null&&!isNaN(Number(deVal)))?Number(deVal).toFixed(2):'N/D';

      // P/CF
      var pcfVal=mt.pfcfShareTTM!=null?mt.pfcfShareTTM
               :(mt['p/fcfShareTTM']!=null?mt['p/fcfShareTTM']
               :(mt.pToFcfTTM!=null?mt.pToFcfTTM
               :(mt.priceToFreeCashFlowTTM!=null?mt.priceToFreeCashFlowTTM:null)));
      var pcfDisplay=(!isETF&&pcfVal!=null&&Number(pcfVal)>0)?Number(pcfVal).toFixed(1):'N/D';

      // PE
      var peVal=mt.peBasicExclExtraTTM!=null?mt.peBasicExclExtraTTM
              :(mt.peNormalizedAnnual!=null?mt.peNormalizedAnnual
              :(mt.peTTM!=null?mt.peTTM:null));

      // PB
      var pbVal=mt.pbAnnual!=null?mt.pbAnnual:(mt.pbQuarterly!=null?mt.pbQuarterly:null);

      // PS
      var psVal=mt.psTTM!=null?mt.psTTM
              :(mt.psAnnual!=null?mt.psAnnual
              :(mt.psQuarterly!=null?mt.psQuarterly:null));

      // PEG — directo, o calcular desde PE / crecimiento EPS
      var pegVal=mt.pegAnnual!=null?mt.pegAnnual
               :(mt.priceEarningToGrowthAnnual!=null?mt.priceEarningToGrowthAnnual:null);
      if(!isETF&&pegVal==null&&peVal!=null&&Number(peVal)>0){
        var epsG=mt.epsGrowthTTMYoy!=null?mt.epsGrowthTTMYoy
                :(mt.epsGrowth3Y!=null?mt.epsGrowth3Y
                :(mt.epsGrowth5Y!=null?mt.epsGrowth5Y
                :(mt.revenueGrowth3Y!=null?mt.revenueGrowth3Y:null)));
        if(epsG!=null&&Number(epsG)>0){pegVal=Number(peVal)/Number(epsG);}
      }

      // ── PROYECCIÓN ANALISTAS (solo acciones) ──
      var projUpside=null,projTarget=null,projHigh=null,projLow=null;
      var projBuy=0,projHold=0,projSell=0,projConsensus=null,projTotal=0;
      if(!isETF){
        if(ptData.targetMean&&price>0){
          projTarget=Number(ptData.targetMean).toFixed(2);
          projHigh=ptData.targetHigh?Number(ptData.targetHigh).toFixed(2):null;
          projLow=ptData.targetLow?Number(ptData.targetLow).toFixed(2):null;
          projUpside=((ptData.targetMean-price)/price*100).toFixed(1);
        }
        if(recData&&(recData.buy||recData.hold||recData.sell||recData.strongBuy||recData.strongSell)){
          projBuy=(recData.strongBuy||0)+(recData.buy||0);
          projHold=recData.hold||0;
          projSell=(recData.strongSell||0)+(recData.sell||0);
          projTotal=projBuy+projHold+projSell;
          if(projTotal>0){
            var buyRatio=projBuy/projTotal;
            var sellRatio=projSell/projTotal;
            projConsensus=buyRatio>0.65?'Compra Fuerte':buyRatio>0.45?'Compra':sellRatio>0.45?'Venta Fuerte':sellRatio>0.25?'Reducir':'Mantener';
          }
        }
      }
      // ── PROYECCIÓN ETF: rendimiento histórico anual del índice ──
      var etfHistReturn=etfRef&&etfRef.histReturn?etfRef.histReturn:null;
      var etfHistNote=etfRef&&etfRef.histNote?etfRef.histNote:null;

      // ── ESTIMADO DE CRECIMIENTO ANUAL (para el icono) ──
      // Acciones: 1) upside analistas  2) crecimiento EPS TTM  3) crecimiento EPS 3Y  4) crecimiento ingresos 3Y
      // ETF:      1) rendimiento histórico del índice
      var growthEst=null,growthSrc='';
      if(!isETF){
        if(projUpside!=null){
          growthEst=parseFloat(projUpside);
          growthSrc='Upside estimado por analistas (precio objetivo)';
        } else {
          var eg2=mt.epsGrowthTTMYoy!=null?mt.epsGrowthTTMYoy
                 :(mt.epsGrowth3Y!=null?mt.epsGrowth3Y
                 :(mt.epsGrowth5Y!=null?mt.epsGrowth5Y
                 :(mt.revenueGrowth3Y!=null?mt.revenueGrowth3Y:null)));
          if(eg2!=null&&!isNaN(Number(eg2))){
            growthEst=Number(eg2);
            growthSrc=mt.epsGrowthTTMYoy!=null?'Crecimiento EPS (TTM vs año anterior)':mt.epsGrowth3Y!=null?'Crecimiento EPS promedio 3 años':'Crecimiento de ingresos promedio 3 años';
          }
        }
      } else {
        // ETF: extraer número del string histReturn (ej: "+10.5%/año" → 10.5)
        if(etfHistReturn){
          var hm=etfHistReturn.match(/([\-\+]?\d+\.?\d*)/);
          if(hm){growthEst=parseFloat(hm[1]);growthSrc=etfHistNote||'Rendimiento histórico anual promedio';}
        }
      }

      // Descripción: usar ref interna si existe, si no dejar vacío
      var desc=etfRef?etfRef.desc:'';
      var website=pr.weburl||(etfRef?etfRef.website:'')||'';

      var d={
        ticker:k,
        name:pr.name||(etfRef?etfRef.name:k),
        sector:pr.finnhubIndustry||(etfRef?etfRef.sector:'')||'',
        industry:pr.finnhubIndustry||'',
        exchange:pr.exchange||(etfRef?etfRef.exchange:'')||'',
        price:price&&price!==0?'$'+Number(price).toFixed(2):'N/D',
        chg:chgNum!=null?((chgNum>=0?'+':'')+chgNum.toFixed(2)+'%'):null,
        chgPos:(chgNum||0)>=0,
        mktCap:fmtMC(pr.marketCapitalization),
        pe:isETF?'N/D':fmtN(peVal),
        pb:isETF?'N/D':fmtN(pbVal),
        ps:isETF?'N/D':fmtN(psVal),
        pcf:isETF?'N/D':pcfDisplay,
        peg:isETF?'N/D':fmtN(pegVal),
        roe:roeDisplay,
        debt:debtDisplay,
        desc:desc,
        website:website,
        isETF:isETF,
        ter:etfRef?etfRef.ter:'N/D',
        index:etfRef?etfRef.index:'N/D',
        holdings:etfRef?etfRef.holdings:'N/D',
        aumMill:aumMill,
        aumDisplay:aumDisplay,
        liqMill:liqMill,
        liqDisplay:liqDisplay,
        gestora:etfGestora,
        gestoraTier:etfGestoraTier,
        replica:etfReplica,
        td:etfTD,
        // Proyección
        projUpside:projUpside,
        projTarget:projTarget,
        projHigh:projHigh,
        projLow:projLow,
        projBuy:projBuy,
        projHold:projHold,
        projSell:projSell,
        projTotal:projTotal,
        projConsensus:projConsensus,
        etfHistReturn:etfHistReturn,
        etfHistNote:etfHistNote,
        growthEst:growthEst,
        growthSrc:growthSrc,
        volPct:(function(){
          var h=mt['52WeekHighDate']?null:mt['52WeekHigh'];
          var lo=mt['52WeekLow'];
          // Finnhub usa 52WeekHigh / 52WeekLow directamente
          var hi52=mt['52WeekHigh']!=null?Number(mt['52WeekHigh']):null;
          var lo52=mt['52WeekLow']!=null?Number(mt['52WeekLow']):null;
          if(hi52&&lo52&&lo52>0){return parseFloat(((hi52-lo52)/lo52*100).toFixed(1));}
          return null;
        })(),
      };
      cache.current[k]=d;setRes(d);setDbg('');setLoading(false);
    }).catch(function(e){
      setErr('Error de conexión: '+e.message);
      setDbg('');setLoading(false);
    });
  };

  const autoPC=(d)=>{
    const pros=[],cons=[];
    const pe=parseFloat(d.pe),roe=parseFloat(d.roe),debt=parseFloat(d.debt),peg=parseFloat(d.peg);
    if(!isNaN(pe)&&pe>0&&pe<18)pros.push('PE bajo (<18) — valoración potencialmente atractiva');
    if(!isNaN(pe)&&pe>40)cons.push('PE elevado (>40) — mercado descuenta altas expectativas');
    if(!isNaN(roe)&&roe>20)pros.push(`ROE de ${d.roe} — empresa muy eficiente con su capital`);
    if(!isNaN(roe)&&roe>0&&roe<5)cons.push('ROE bajo (<5%) — poca eficiencia sobre el capital propio');
    if(!isNaN(debt)&&debt<0.3)pros.push('Baja deuda (D/E <0.3) — balance sólido');
    if(!isNaN(debt)&&debt>1.5)cons.push('Alta deuda (D/E >1.5) — mayor riesgo financiero en crisis');
    if(!isNaN(peg)&&peg>0&&peg<1)pros.push('PEG <1 — precio razonable para el crecimiento proyectado');
    if(!isNaN(peg)&&peg>3)cons.push('PEG >3 — mercado descuenta crecimiento muy elevado');
    if(!pros.length)pros.push('No hay señales positivas claras en las métricas disponibles');
    if(!cons.length)cons.push('No se detectan alertas claras en las métricas disponibles');
    return{pros,cons};
  };

  // Califica cada métrica: 'green' | 'yellow' | 'red' | 'none'
  // Para ETFs: pasar raw (número) y tier (string) según la métrica
  const gradeMetric=(key,val,tier)=>{
    if(val===null||val===undefined||val==='N/D')return'none';
    var n=parseFloat(val);
    switch(key){
      // — Métricas de acciones —
      case'PE Ratio':   if(isNaN(n))return'none';return n>0&&n<18?'green':n<=30?'yellow':'red';
      case'P/Book':     if(isNaN(n))return'none';return n>0&&n<1.5?'green':n<=4?'yellow':'red';
      case'P/Sales':    if(isNaN(n))return'none';return n>0&&n<2?'green':n<=5?'yellow':'red';
      case'P/Cash Flow':if(isNaN(n))return'none';return n>0&&n<15?'green':n<=25?'yellow':'red';
      case'PEG Ratio':  if(isNaN(n))return'none';return n>0&&n<1?'green':n<=2?'yellow':'red';
      case'ROE':        if(isNaN(n))return'none';return n>=20?'green':n>=10?'yellow':'red';
      case'Deuda/Capital':if(isNaN(n))return'none';return n>=0&&n<0.5?'green':n<=1.5?'yellow':'red';
      // — Métricas ETF —
      case'Comisión (TER)':if(isNaN(n))return'none';return n<0.15?'green':n<=0.5?'yellow':'red';
      case'Tamaño (AUM)': // val=millones
        if(isNaN(n)||n<=0)return'none';return n>=1000?'green':n>=100?'yellow':'red';
      case'Liquidez': // val=millones $/día
        if(isNaN(n)||n<=0)return'none';return n>=50?'green':n>=10?'yellow':'red';
      case'Tracking Diff.': // val=porcentaje como número ej: 0.01
        if(isNaN(n))return'none';return n<0.10?'green':n<=0.30?'yellow':'red';
      case'Réplica':
        return val==='Física'?'green':val==='Física (Muestreo)'?'yellow':val==='Sintética'?'red':'none';
      case'Gestora':
        return tier==='top'?'green':tier==='mid'?'yellow':tier==='low'?'red':'none';
      default:return'none';
    }
  };
  const GRADE_COLOR={green:C.mint,yellow:'#F5C518',red:C.red,none:C.tf};
  const GRADE_BORDER={green:C.mintD,yellow:'#7A6010',red:'#6B2020',none:C.line};
  const GRADE_BG={green:'rgba(61,220,151,0.07)',yellow:'rgba(245,197,24,0.07)',red:'rgba(224,93,93,0.07)',none:C.s};
  const GRADE_LABEL={green:'Atractivo',yellow:'Moderado',red:'Alerta',none:''};

  // Puntaje de acciones (0-100%)
  const calcScore=(mets)=>{
    const W={'PE Ratio':2,'P/Book':1,'P/Sales':1,'P/Cash Flow':1.5,'PEG Ratio':1.5,'ROE':2,'Deuda/Capital':2};
    const PTS={green:100,yellow:50,red:0,none:null};
    var tw=0,ws=0;
    mets.forEach(function(m){
      var g=gradeMetric(m.k,m.raw!=null?m.raw:m.v,m.tier);
      var p=PTS[g];
      if(p!==null&&W[m.k]){ws+=p*W[m.k];tw+=W[m.k];}
    });
    return tw>0?Math.round(ws/tw):null;
  };
  // Puntaje ETF (0-100%) — incluye TER, tamaño, liquidez, tracking diff, réplica, gestora
  const calcETFScore=(mets)=>{
    const W={'Comisión (TER)':2,'Tamaño (AUM)':2,'Liquidez':2,'Tracking Diff.':2.5,'Réplica':1.5,'Gestora':2};
    const PTS={green:100,yellow:50,red:0,none:null};
    var tw=0,ws=0;
    mets.forEach(function(m){
      var g=gradeMetric(m.k,m.raw!=null?m.raw:m.v,m.tier);
      var p=PTS[g];
      if(p!==null&&W[m.k]){ws+=p*W[m.k];tw+=W[m.k];}
    });
    return tw>0?Math.round(ws/tw):null;
  };

  const metrics=res?(res.isETF?[
    // Métricas calificadas con color
    {k:'Comisión (TER)',v:res.ter||'N/D',raw:parseFloat(res.ter)||null,h:'Costo anual sobre el capital. <0.15% excelente · 0.15-0.5% bueno · >0.5% elevado'},
    {k:'Tamaño (AUM)',v:res.aumDisplay||'N/D',raw:res.aumMill,h:'Activos bajo gestión. >$1B muy seguro · $100M-$1B aceptable · <$100M riesgo de cierre o baja liquidez'},
    {k:'Liquidez',v:res.liqDisplay||'N/D',raw:res.liqMill,h:'Volumen diario negociado en $. >$50M/día excelente · $10-50M aceptable · <$10M bajo'},
    {k:'Tracking Diff.',v:res.td||'N/D',raw:res.td!=='N/D'?parseFloat(res.td):null,h:'Diferencia entre rendimiento del ETF y su índice. <0.10% excelente · 0.10-0.30% bueno · >0.30% elevado'},
    {k:'Réplica',v:res.replica||'N/D',h:'Física: posee los activos directamente (más seguro). Sintética: usa derivados/swaps (más riesgo de contraparte)'},
    {k:'Gestora',v:res.gestora||'N/D',tier:res.gestoraTier,h:'Empresa que gestiona el ETF. Vanguard, BlackRock, State Street, Schwab e Invesco son las más reputadas del mundo'},
    // Info adicional (sin calificación)
    {k:'Índice replicado',v:res.index||'N/D',h:'Benchmark que sigue el ETF'},
    {k:'Nº posiciones',v:res.holdings||'N/D',h:'Cantidad de empresas o activos dentro del fondo'},
  ]:[
    {k:'PE Ratio',v:res.pe,h:'Precio entre ganancias (TTM). <18 barato · 18-30 justo · >30 caro'},
    {k:'P/Book',v:res.pb,h:'Precio entre valor contable. <1.5 barato · 1.5-4 justo · >4 caro'},
    {k:'P/Sales',v:res.ps,h:'Precio entre ventas TTM. <2 barato · 2-5 justo · >5 caro'},
    {k:'P/Cash Flow',v:res.pcf,h:'Precio entre flujo de caja operativo. <15 bueno · 15-25 justo · >25 caro'},
    {k:'PEG Ratio',v:res.peg,h:'PE ajustado por crecimiento. <1 atractivo · 1-2 justo · >2 caro'},
    {k:'ROE',v:res.roe,h:'Retorno sobre capital propio (TTM). >20% excelente · 10-20% bueno · <10% débil'},
    {k:'Deuda/Capital',v:res.debt,h:'Deuda total entre capital propio. <0.5 bajo riesgo · 0.5-1.5 moderado · >1.5 alto'},
  ]):[];
  const pc=res?autoPC(res):{pros:[],cons:[]};

  return(
    <div style={{maxWidth:920,margin:'0 auto',padding:'48px 20px'}}>
      <ModHeader eyebrow="Módulo 02" title="Explorador de activos" body="Busca cualquier acción o ETF — PE, PB, PS, PCF, PEG, ROE, Deuda/Capital en tiempo real vía Finnhub."/>

      {/* Panel de clave API — Finnhub */}
      {!avKey?(
        <div style={{borderRadius:14,border:'1px solid '+C.mintD,background:'rgba(61,220,151,0.05)',padding:'24px 28px',marginBottom:28}}>
          <p style={{fontSize:15,fontWeight:700,color:C.mint,margin:'0 0 4px'}}>🔑 Conecta tu clave gratuita de Finnhub</p>
          <p style={{fontSize:12,color:C.tf,margin:'0 0 14px'}}>Sin límite diario · 60 búsquedas/minuto · Sin tarjeta de crédito</p>
          <p style={{fontSize:13,color:C.td,lineHeight:1.7,margin:'0 0 16px'}}>
            <strong style={{color:C.t}}>Paso 1:</strong> Abre{' '}
            <a href="https://finnhub.io/register" target="_blank" rel="noopener noreferrer" style={{color:C.blue,fontWeight:600}}>finnhub.io/register</a>
            {' '}→ ingresa tu email → copia la clave que aparece en el dashboard.<br/>
            <strong style={{color:C.t}}>Paso 2:</strong> Pégala abajo y pulsa <strong style={{color:C.mint}}>Activar →</strong>
          </p>
          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
            <input value={keyDraft} onChange={e=>setKeyDraft(e.target.value)} placeholder="Pega aquí tu clave de Finnhub..."
              style={{flex:1,minWidth:220,padding:'11px 14px',borderRadius:8,border:'1px solid '+C.line,background:C.s2,color:C.t,fontSize:13,outline:'none'}}/>
            <button onClick={()=>{var v=keyDraft.trim();if(v){localStorage.setItem('mc_finnhub_key',v);setAvKey(v);setErr(null);}}}
              style={{padding:'11px 22px',borderRadius:8,border:'none',background:C.mint,color:'#051A0F',fontWeight:700,fontSize:13,cursor:'pointer',flexShrink:0}}>
              Activar →
            </button>
          </div>
        </div>
      ):(
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 16px',borderRadius:8,background:C.s,border:'1px solid '+C.line,marginBottom:20,gap:12,flexWrap:'wrap'}}>
          <span style={{fontSize:12.5,color:C.td}}>🟢 Finnhub conectado — sin límite diario · <span className="mono" style={{color:C.tf}}>{avKey.slice(0,6)}•••</span></span>
          <button onClick={()=>{localStorage.removeItem('mc_finnhub_key');setAvKey('');setKeyDraft('');setRes(null);cache.current={};}}
            style={{fontSize:11,color:C.tf,background:'transparent',border:'1px solid '+C.line,borderRadius:6,padding:'4px 10px',cursor:'pointer'}}>
            Cambiar clave
          </button>
        </div>
      )}
      <div style={{display:'flex',gap:8,marginBottom:14}}>
        <input type="text" value={q} onChange={e=>setQ(e.target.value.toUpperCase())} onKeyDown={e=>{if(e.key==='Enter'&&q.trim().length>0){e.preventDefault();search(q.trim());}}} placeholder="Escribe un ticker: AAPL, MSFT, VOO, QQQ, PLTR..."
          style={{flex:1,padding:'12px 16px',borderRadius:10,border:'1.5px solid '+C.line,background:C.s,color:C.mint,fontFamily:'JetBrains Mono,monospace',fontSize:15,outline:'none'}}/>
        <button type="button" onClick={()=>{if(q.trim().length>0)search(q.trim());}} style={{padding:'12px 22px',borderRadius:10,border:'none',background:C.mint,color:'#051A0F',fontWeight:700,fontSize:14,cursor:'pointer',flexShrink:0}}>
          🔍 Buscar
        </button>
      </div>
      <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:32}}>
        {QUICK.map(t=>(
          <button key={t} onClick={()=>{setQ(t);search(t);}} style={{padding:'5px 12px',borderRadius:6,border:`1px solid ${C.line}`,background:'transparent',color:C.tf,fontFamily:'JetBrains Mono,monospace',fontSize:12,cursor:'pointer'}}
            onMouseOver={e=>e.currentTarget.style.color=C.mint}
            onMouseOut={e=>e.currentTarget.style.color=C.tf}>
            {t}
          </button>
        ))}
      </div>

      {loading&&(
        <div style={{textAlign:'center',padding:'60px 0'}}>
          <div className="sp" style={{margin:'0 auto 16px'}}/>
          <p className="mono" style={{fontSize:13,color:C.tf}}>Cargando datos de {q}...</p>
        </div>
      )}
      {err&&!loading&&(
        <div style={{padding:'20px',borderRadius:12,border:`1px solid ${C.red}`,background:'rgba(224,93,93,0.08)',color:C.terra,fontSize:14,lineHeight:1.5}}>⚠ {err}</div>
      )}
      {dbg&&!loading&&(
        <div style={{padding:'10px 14px',borderRadius:8,background:C.s2,border:'1px solid '+C.line,marginBottom:12,fontSize:12,color:C.tf,fontFamily:'JetBrains Mono,monospace'}}>
          🔎 {dbg}
        </div>
      )}
      {!res&&!loading&&!err&&(
        <div style={{textAlign:'center',padding:'60px 20px',border:'1px dashed '+C.line,borderRadius:14,color:C.tf}}>
          <p style={{fontSize:36,marginBottom:12}}>🔍</p>
          <p style={{fontSize:15,marginBottom:6}}>Escribe un ticker arriba</p>
          <p style={{fontSize:13}}>o haz clic en los accesos rápidos para cargar datos</p>
        </div>
      )}
      {res&&!loading&&(
        <div>
          <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',flexWrap:'wrap',gap:16,marginBottom:16}}>
            <div>
              <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:4}}>
                <span className="mono" style={{fontSize:34,fontWeight:700,color:C.mint}}>{res.ticker}</span>
                <span style={{display:'inline-flex',alignItems:'center',gap:5,fontSize:11,color:C.mint,border:`1px solid ${C.mintD}`,borderRadius:4,padding:'2px 8px'}}>
                  <span style={{width:5,height:5,borderRadius:'50%',background:C.mint,display:'inline-block'}}/>en vivo
                </span>
              </div>
              <p style={{fontSize:16,color:C.td,margin:'0 0 4px'}}>{res.name}</p>
              <p style={{fontSize:13,color:C.tf}}>{res.sector}{res.exchange?` · ${res.exchange}`:''}</p>
            </div>
            <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:8}}>
              <div style={{textAlign:'right'}}>
                <p className="mono" style={{fontSize:30,fontWeight:700,color:C.t}}>{res.price}</p>
                {res.chg&&<p className="mono" style={{fontSize:14,color:res.chgPos?C.mint:C.red}}>{res.chg}</p>}
                <p style={{fontSize:13,color:C.tf}}>Mkt Cap: <span style={{color:C.td}}>{res.mktCap}</span></p>
              </div>
              <button onClick={toggleWl} style={{display:'inline-flex',alignItems:'center',gap:7,padding:'10px 18px',borderRadius:9,border:'none',background:inWl?'rgba(61,220,151,0.12)':'linear-gradient(135deg,#3DDC97,#22c55e)',color:inWl?C.mint:'#051A0F',fontSize:13,fontWeight:700,cursor:'pointer',whiteSpace:'nowrap',boxShadow:inWl?'none':'0 2px 12px rgba(61,220,151,0.35)',letterSpacing:'0.01em',transition:'all 0.2s'}}>
                <span style={{fontSize:15}}>{inWl?'✓':'📋'}</span>
                {inWl?'En Seguimiento':'Agregar a Seguimiento'}
              </button>
            </div>
          </div>
          {/* Badge caída con potencial */}
          {!res.isCrypto&&res.chg&&!res.chgPos&&parseFloat(res.chg)<=-2&&(()=>{
            var chgNum=parseFloat(res.chg);
            var upside=res.projUpside!=null?Number(res.projUpside):null;
            var badge;
            if(upside!=null&&upside>=15){badge={label:'🎯 Caída con Potencial',sub:'Analistas proyectan recuperación: +'+upside+'% hacia precio objetivo',color:C.mint,bg:'rgba(61,220,151,0.07)',border:C.mintD};}
            else if(upside!=null&&upside>=5){badge={label:'⚠️ A Vigilar',sub:'Caída de '+chgNum.toFixed(1)+'% con potencial de recuperación moderado (+'+upside+'%)',color:'#F5C518',bg:'rgba(245,197,24,0.07)',border:'#7A6010'};}
            else{badge={label:'🔴 Riesgo Real',sub:'Activo en caída'+(upside!=null?' con analistas viendo escaso potencial ('+upside+'%)':' sin señal clara de recuperación de analistas'),color:C.red,bg:'rgba(224,93,93,0.07)',border:'#6B2020'};}
            return(
              <div style={{padding:'12px 16px',borderRadius:10,background:badge.bg,border:`1px solid ${badge.border}`,marginBottom:16,display:'flex',alignItems:'center',gap:12}}>
                <span style={{fontSize:20,lineHeight:1,flexShrink:0}}>{badge.label.split(' ')[0]}</span>
                <div>
                  <p style={{margin:0,fontSize:14,fontWeight:600,color:badge.color}}>{badge.label}</p>
                  <p style={{margin:'2px 0 0',fontSize:12,color:C.tf}}>{badge.sub}</p>
                </div>
              </div>
            );
          })()}
          {/* ── MÉTRICAS CRIPTO ── */}
          {res.isCrypto&&(()=>{
            var cm=[
              {k:'Cap. de Mercado',v:res.cryptoMcapDisplay,g:res.cryptoMcapGrade,h:'Tamaño del proyecto por capitalización. Mayor cap = generalmente menos riesgo.'},
              {k:'Madurez',v:res.cryptoAge+' años',g:res.cryptoAgeGrade,h:'Tiempo desde lanzamiento. Proyectos >5 años han resistido múltiples ciclos de mercado.'},
              {k:'Caso de Uso',v:res.cryptoUse,g:res.cryptoUseGrade,h:'Infraestructura/L1 más sólido · Utilidad/DeFi intermedio · Meme puramente especulativo.'},
              {k:'Liquidez 24h',v:res.cryptoLiqDisplay,g:res.cryptoLiqGrade,h:'Volumen diario negociado en $. Mayor liquidez = más fácil entrar y salir sin impacto en precio.'},
            ];
            var cScore=(()=>{var wm={mega:100,large:75,mid:40,small:10};var wa={green:100,yellow:50,red:0,none:null};var total=0,ws=0;[{g:res.cryptoMcapGrade,w:3},{g:res.cryptoAgeGrade,w:2},{g:res.cryptoUseGrade,w:3},{g:res.cryptoLiqGrade,w:2}].forEach(function(x){if(wa[x.g]!=null){ws+=wa[x.g]*x.w;total+=x.w;}});return total>0?Math.round(ws/total):null;})();
            var sc2=cScore!=null?(cScore>=65?C.mint:cScore>=35?'#F5C518':C.red):C.tf;
            var slabel2=cScore!=null?(cScore>=65?'Riesgo Bajo — Criptoactivo Establecido':cScore>=35?'Riesgo Moderado':cScore<20?'⚠ Riesgo Muy Alto — Altamente Especulativo':'Riesgo Alto'):'';
            return(
              <div>
                <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(160px,1fr))',gap:8,marginBottom:16}}>
                  {cm.map(function(m){var gc=GRADE_COLOR[m.g];var gb=GRADE_BORDER[m.g];var gbg=GRADE_BG[m.g];var gl=GRADE_LABEL[m.g];return(
                    <div key={m.k} style={{padding:'14px 16px',borderRadius:10,background:gbg,border:'1px solid '+gb,position:'relative',overflow:'hidden'}}>
                      {m.g!=='none'&&<div style={{position:'absolute',top:0,left:0,right:0,height:3,background:gc,borderRadius:'10px 10px 0 0',opacity:0.8}}/>}
                      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8,paddingTop:m.g!=='none'?2:0}}>
                        <p title={m.h} style={{fontSize:11,color:C.tf,margin:0,cursor:'help',lineHeight:1.3}}>{m.k}</p>
                        {gl&&<span style={{fontSize:9.5,color:gc,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.04em',flexShrink:0,marginLeft:4}}>{gl}</span>}
                      </div>
                      <div style={{display:'flex',alignItems:'center',gap:7}}>
                        {m.g!=='none'&&<span style={{width:8,height:8,borderRadius:'50%',background:gc,flexShrink:0,display:'inline-block',boxShadow:'0 0 8px '+gc+'80'}}/>}
                        <p className="mono" style={{fontSize:14,fontWeight:700,color:m.g!=='none'?gc:C.t,margin:0}}>{m.v}</p>
                      </div>
                    </div>
                  );})}
                </div>
                {cScore!=null&&(
                  <div style={{display:'flex',alignItems:'center',gap:20,padding:'16px 22px',borderRadius:14,background:cScore>=65?'rgba(61,220,151,0.06)':cScore>=35?'rgba(245,197,24,0.06)':'rgba(224,93,93,0.06)',border:'1px solid '+(cScore>=65?C.mintD:cScore>=35?'#7A6010':'#6B2020'),marginBottom:16,flexWrap:'wrap'}}>
                    {(()=>{var r=40,circ=2*Math.PI*r,dash=(cScore/100)*circ;return(

                    {res.volPct!=null&&(()=>{

                            <text x="48" y="57" textAnchor="middle" fill={C.tf} fontSize="7.5" fontFamily="sans-serif">VOLATILIDAD</text>
                          </svg>
                          <div style={{fontSize:10,color:vc,fontWeight:700,marginTop:-2}}>{vlbl}</div>

                        </div>

                    })()}
                    <div style={{flex:1,minWidth:180}}>
                      <p style={{fontSize:16,fontWeight:700,color:sc2,margin:'0 0 6px'}}>{slabel2}</p>
                      <p style={{fontSize:12.5,color:C.td,lineHeight:1.6,margin:'0 0 10px'}}>Score basado en capitalización, madurez, caso de uso y liquidez. Las criptomonedas son activos de alto riesgo: nunca inviertas más de lo que puedas perder. Diversifica siempre.</p>
                      {res.cryptoHi&&<p style={{fontSize:12,color:C.tf,margin:0}}>Rango 24h: <span style={{color:C.mint}}>{res.cryptoHi}</span> — <span style={{color:C.red}}>{res.cryptoLo}</span></p>}
                    </div>
                  </div>
                )}
              </div>
            );
          })()}
          {/* ── GRID MÉTRICAS ACCIONES / ETF ── */}
          {!res.isCrypto&&<div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(148px,1fr))',gap:8,marginBottom:20}}>
            {metrics.map(m=>{
              var g=gradeMetric(m.k,m.raw!=null?m.raw:m.v,m.tier);
              var gc=GRADE_COLOR[g];var gb=GRADE_BORDER[g];var gbg=GRADE_BG[g];var gl=GRADE_LABEL[g];
              return(
                <div key={m.k} style={{padding:'14px 16px',borderRadius:10,background:gbg,border:`1px solid ${gb}`,position:'relative',overflow:'hidden'}}>
                  {g!=='none'&&<div style={{position:'absolute',top:0,left:0,right:0,height:3,background:gc,borderRadius:'10px 10px 0 0',opacity:0.8}}/>}
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:10,paddingTop:g!=='none'?2:0}}>
                    <p title={m.h} style={{fontSize:11,color:C.tf,margin:0,cursor:'help',lineHeight:1.3}}>{m.k}</p>
                    {gl&&<span style={{fontSize:9.5,color:gc,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.04em',flexShrink:0,marginLeft:4}}>{gl}</span>}
                  </div>
                  <div style={{display:'flex',alignItems:'center',gap:7}}>
                    {g!=='none'&&<span style={{width:8,height:8,borderRadius:'50%',background:gc,flexShrink:0,display:'inline-block',boxShadow:`0 0 8px ${gc}80`}}/>}
                    <p className="mono" style={{fontSize:19,fontWeight:700,color:m.v==='N/D'?C.tf:g!=='none'?gc:C.t,margin:0}}>{m.v}</p>
                  </div>
                </div>
              );
            })}
          </div>}
          {/* ── WIDGET PROYECCIÓN DE CRECIMIENTO ANUAL ── */}
          {(()=>{
            // ACCIONES: precio objetivo + consenso analistas
            if(!res.isETF&&res.projTarget){
              var up=parseFloat(res.projUpside);
              var pc=!isNaN(up)?(up>=15?C.mint:up>=5?'#F5C518':C.red):C.tf;
              var pb2=!isNaN(up)?(up>=15?C.mintD:up>=5?'#7A6010':'#6B2020'):C.line;
              var pbg=!isNaN(up)?(up>=15?'rgba(61,220,151,0.06)':up>=5?'rgba(245,197,24,0.06)':'rgba(224,93,93,0.06)'):C.s;
              var upLabel=!isNaN(up)?(up>=15?'Alto potencial':up>=5?'Potencial moderado':up>=0?'Potencial bajo':'Por debajo del precio actual'):'';
              var cIcon=res.projConsensus==='Compra Fuerte'?'🟢':res.projConsensus==='Compra'?'🟢':res.projConsensus==='Mantener'?'🟡':res.projConsensus==='Reducir'?'🔴':res.projConsensus==='Venta Fuerte'?'🔴':'⚪';
              return(
                <div style={{padding:'18px 22px',borderRadius:14,background:pbg,border:'1px solid '+pb2,marginBottom:16}}>
                  <p style={{fontSize:11.5,color:C.tf,fontWeight:600,letterSpacing:'0.06em',textTransform:'uppercase',margin:'0 0 12px'}}>📊 Proyección Analistas — Precio Objetivo</p>
                  <div style={{display:'flex',alignItems:'flex-start',gap:28,flexWrap:'wrap'}}>
                    <div>
                      <p className="mono" style={{fontSize:34,fontWeight:800,color:pc,margin:0,lineHeight:1}}>
                        {!isNaN(up)?(up>=0?'+':'')+up+'%':'N/D'}
